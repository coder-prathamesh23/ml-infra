# ==========================================
# GENERATE IMPORT CONFIG - shared-app-service
# ==========================================
- stage: GenerateImportConfig
  displayName: 'GENERATE IMPORT CONFIG - shared-app-service'
  dependsOn: []
  condition: eq('${{ parameters.runMode }}', 'generate-import-config')

  jobs:
  - job: generate_import_config
    displayName: 'Generate Terraform starter config - shared-app-service'
    steps:
    - checkout: self

    - template: templates/ensure-az-cli.yml

    - template: templates/bootstrap-terraform.yml
      parameters:
        tfVersion: ${{ variables.TF_VERSION }}
        skipIfPresent: true

    - task: Bash@3
      name: ProbeSeedRun
      displayName: 'Probe for prior shared-app-service tfstate artifact'
      env:
        SYSTEM_ACCESSTOKEN: $(System.AccessToken)
      inputs:
        targetType: inline
        script: |
          set -euo pipefail

          ORG_URL="$(System.CollectionUri)"
          PROJECT="$(System.TeamProject)"
          DEF_ID="$(System.DefinitionId)"
          BRANCH="$(Build.SourceBranch)"
          ARTIFACT_NAME="$(TFSTATE_ARTIFACT_NAME)"
          CURRENT_BUILD_ID="$(Build.BuildId)"

          echo "Looking for latest successful prior run with artifact: $ARTIFACT_NAME"

          command -v jq >/dev/null 2>&1 || { echo "ERROR: jq missing on agent"; exit 1; }

          BUILDS_JSON=$(curl -sS \
            -H "Authorization: Bearer ${SYSTEM_ACCESSTOKEN}" \
            "${ORG_URL}${PROJECT}/_apis/build/builds?definitions=${DEF_ID}&branchName=${BRANCH}&resultFilter=succeeded&queryOrder=finishTimeDescending&%24top=50&api-version=7.1-preview.7")

          BUILD_IDS=$(echo "$BUILDS_JSON" | jq -r '.value[].id')
          SEED_RUN_ID="none"

          for BID in $BUILD_IDS; do
            if [ "$BID" = "$CURRENT_BUILD_ID" ]; then
              continue
            fi

            ART_JSON=$(curl -sS \
              -H "Authorization: Bearer ${SYSTEM_ACCESSTOKEN}" \
              "${ORG_URL}${PROJECT}/_apis/build/builds/${BID}/artifacts?api-version=7.1-preview.5")

            MATCH=$(echo "$ART_JSON" | jq -r --arg N "$ARTIFACT_NAME" '.value[]?.name | select(.==$N)' | head -n1 || true)

            if [ -n "$MATCH" ]; then
              echo "Found state artifact in run: $BID"
              SEED_RUN_ID="$BID"
              break
            fi
          done

          echo "SeedRunId: $SEED_RUN_ID"
          echo "##vso[task.setvariable variable=SeedRunId]$SEED_RUN_ID"

    - task: DownloadPipelineArtifact@2
      displayName: 'Restore previous shared-app-service state artifact'
      condition: and(succeeded(), ne(variables.SeedRunId, 'none'))
      inputs:
        buildType: 'specific'
        project: '$(System.TeamProject)'
        definition: '$(System.DefinitionId)'
        buildVersionToDownload: 'specific'
        pipelineId: '$(SeedRunId)'
        artifactName: '$(TFSTATE_ARTIFACT_NAME)'
        targetPath: '$(System.DefaultWorkingDirectory)/$(STATE_DIR)'
      continueOnError: true

    - task: AzureCLI@2
      displayName: 'Generate Terraform starter config from manifest'
      inputs:
        azureSubscription: $(AZ_SC_APPLY)
        scriptType: bash
        scriptLocation: inlineScript
        workingDirectory: $(System.DefaultWorkingDirectory)
        inlineScript: |
          set -euo pipefail

          OUTDIR="$(Build.ArtifactStagingDirectory)/generated-import-config"
          REPO_ROOT="$(System.DefaultWorkingDirectory)"
          MANIFEST="$REPO_ROOT/$(RECONCILIATION_DIR)/import-manifest.csv"

          mkdir -p "$OUTDIR"

          command -v az >/dev/null 2>&1 || { echo "ERROR: AZ CLI missing"; exit 1; }
          command -v terraform >/dev/null 2>&1 || { echo "ERROR: Terraform missing"; exit 1; }

          export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
          export ARM_TENANT_ID="$(az account show --query tenantId -o tsv)"
          export ARM_USE_OIDC=true
          export ARM_CLIENT_ID="$(az account show --query user.name -o tsv)"
          export TF_IN_AUTOMATION=1

          echo "Azure account context:"
          az account show -o table | tee "$OUTDIR/az_account_context.txt"

          if [ ! -f "$MANIFEST" ]; then
            echo "ERROR: Manifest not found: $MANIFEST"
            exit 1
          fi

          echo "Manifest content:"
          nl -ba "$MANIFEST" | tee "$OUTDIR/manifest_content.txt"

          if [ ! -d "$(TF_DIR)" ]; then
            echo "ERROR: Terraform folder not found: $(TF_DIR)"
            exit 1
          fi

          mkdir -p "$(STATE_DIR)" "$(TF_DIR)"

          if [ -f "$(STATE_DIR)/terraform.tfstate" ]; then
            cp "$(STATE_DIR)/terraform.tfstate" "$(TF_DIR)/terraform.tfstate"
          fi

          if [ -f "$(STATE_DIR)/terraform.tfstate.backup" ]; then
            cp "$(STATE_DIR)/terraform.tfstate.backup" "$(TF_DIR)/terraform.tfstate.backup"
          fi

          cd "$(TF_DIR)"

          mkdir -p .backend_disabled
          for f in $(grep -rl 'backend *"azurerm"' . || true); do
            mv "$f" ".backend_disabled/$(basename "$f")"
          done

          terraform init -backend=false -input=false 2>&1 | tee "$OUTDIR/terraform_init.txt"

          echo "Detecting existing App Service Plan configuration from Azure"

          PLAN_ID=$(az resource show \
            --resource-group "$(PLAN_RG)" \
            --name "$(SERVICE_PLAN_NAME)" \
            --resource-type "Microsoft.Web/serverfarms" \
            --query id -o tsv)

          PLAN_ID_CANON=$(echo "$PLAN_ID" | sed 's#/providers/Microsoft\.Web/serverfarms/#/providers/Microsoft.Web/serverFarms/#')

          PLAN_LOCATION=$(az resource show --ids "$PLAN_ID_CANON" --query location -o tsv)
          PLAN_SKU=$(az resource show --ids "$PLAN_ID_CANON" --query sku.name -o tsv)
          PLAN_TAGS=$(az resource show --ids "$PLAN_ID_CANON" --query tags -o json)

          if [ -z "$PLAN_SKU" ] || [ "$PLAN_SKU" = "null" ]; then
            echo "ERROR: Could not detect App Service Plan SKU from Azure."
            exit 31
          fi

          if [ -z "$PLAN_TAGS" ] || [ "$PLAN_TAGS" = "null" ]; then
            PLAN_TAGS="{}"
          fi

          echo "Detected App Service Plan:"
          echo "PLAN_ID=$PLAN_ID_CANON"
          echo "PLAN_LOCATION=$PLAN_LOCATION"
          echo "PLAN_SKU=$PLAN_SKU"
          echo "PLAN_TAGS=$PLAN_TAGS"

          export TF_VAR_resource_group_name="$(PLAN_RG)"
          export TF_VAR_location="$PLAN_LOCATION"
          export TF_VAR_service_plan_name="$(SERVICE_PLAN_NAME)"
          export TF_VAR_service_plan_sku="$PLAN_SKU"
          export TF_VAR_tags="$PLAN_TAGS"

          export TF_VAR_function_app_name="$(FUNCTION_APP_NAME)"
          export TF_VAR_function_resource_group_name="$(FUNCTION_RG)"
          export TF_VAR_storage_enabled=false
          export TF_VAR_storage_account_name=""
          export TF_VAR_storage_account_access_key=""
          export TF_VAR_functions_extension_version="~4"
          export TF_VAR_python_version="3.11"
          export TF_VAR_vnet_integration_subnet_id=""
          export TF_VAR_private_endpoint_subnet_id=""

          echo "Current Terraform state list:"
          terraform state list 2>/dev/null | tee "$OUTDIR/terraform_state_list.txt" || true

          ROWS_FILE="$OUTDIR/manifest_rows.tsv"
          rm -f "$ROWS_FILE"

          awk -F',' '
            NR > 1 {
              gsub(/\r/, "", $0)
              if ($2 != "" && $4 != "") {
                print $2 "\t" $4
              }
            }
          ' "$MANIFEST" > "$ROWS_FILE"

          echo "Parsed manifest rows:"
          cat "$ROWS_FILE" | tee "$OUTDIR/parsed_manifest_rows.txt"

          if [ ! -s "$ROWS_FILE" ]; then
            echo "ERROR: No valid manifest rows found."
            exit 2
          fi

          rm -f imports.auto.tf
          STATE_CHECK_FILE="$OUTDIR/state_check_summary.tsv"
          echo -e "tf_address\tazure_exists\tstate_status\tnext_action" > "$STATE_CHECK_FILE"

          echo "Validating Azure resource IDs and generating import blocks only for resources NOT already in state"

          while IFS=$'\t' read -r TF_ADDRESS RESOURCE_ID
          do
            echo "--------------------------------------------------"
            echo "Terraform address: $TF_ADDRESS"
            echo "Azure resource ID: $RESOURCE_ID"

            SAFE_NAME=$(echo "$TF_ADDRESS" | tr '.[]/' '____')

            if echo "$RESOURCE_ID" | grep -qi "/providers/Microsoft.Network/privateEndpoints/"; then
              echo "Detected Private Endpoint. Using explicit supported API version."
              az resource show \
                --ids "$RESOURCE_ID" \
                --api-version "2024-07-01" \
                -o json > "$OUTDIR/${SAFE_NAME}.resource.json"
            else
              az resource show \
                --ids "$RESOURCE_ID" \
                -o json > "$OUTDIR/${SAFE_NAME}.resource.json"
            fi

            if terraform state list 2>/dev/null | grep -Fxq "$TF_ADDRESS"; then
              echo "IN_STATE: $TF_ADDRESS. Skipping import block."
              echo -e "$TF_ADDRESS\ttrue\tIN_STATE\tSKIP_IMPORT" >> "$STATE_CHECK_FILE"
            else
              echo "NOT_IN_STATE: $TF_ADDRESS. Adding import block."
              echo -e "$TF_ADDRESS\ttrue\tNOT_IN_STATE\tGENERATE_IMPORT_CONFIG" >> "$STATE_CHECK_FILE"

              {
                echo "import {"
                echo "  to = $TF_ADDRESS"
                echo "  id = \"$RESOURCE_ID\""
                echo "}"
                echo ""
              } >> imports.auto.tf
            fi
          done < "$ROWS_FILE"

          echo "State check summary:"
          cat "$STATE_CHECK_FILE" | tee "$OUTDIR/state_check_summary_print.txt"

          if [ ! -f imports.auto.tf ] || ! grep -q '^import {' imports.auto.tf; then
            echo "No import blocks generated. All manifest resources already appear to be in state."
            cp "$STATE_CHECK_FILE" "$OUTDIR/state_check_summary.tsv"
            exit 0
          fi

          echo "Generated imports.auto.tf:"
          cat imports.auto.tf | tee "$OUTDIR/imports.auto.tf"

          GENERATED_FILE="$OUTDIR/generated_shared_app_service_import.tf"
          rm -f "$GENERATED_FILE"

          echo "Running terraform plan with -generate-config-out"
          set +e
          terraform plan \
            -no-color \
            -input=false \
            -lock=false \
            -generate-config-out="$GENERATED_FILE" \
            2>&1 | tee "$OUTDIR/terraform_generate_config_plan.txt"
          PLAN_EXIT=${PIPESTATUS[0]}
          set -e

          echo "$PLAN_EXIT" > "$OUTDIR/plan_exit_code.txt"
          echo "Terraform generate-config plan exit code: $PLAN_EXIT"

          if [ -f "$GENERATED_FILE" ]; then
            echo "Generated Terraform config file:"
            ls -la "$GENERATED_FILE"
          else
            echo "ERROR: Expected generated config file was not created."
            exit 33
          fi

          echo "Generate-import-config stage completed. Review generated config before import-plan."

    - task: PublishPipelineArtifact@1
      displayName: 'Publish generated import config'
      condition: always()
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)/generated-import-config'
        artifact: '$(GENERATED_CONFIG_ARTIFACT_NAME)'
