trigger: none
pr: none

parameters:
  - name: action
    displayName: Action
    type: string
    default: generate-config
    values:
      - generate-config
      - import-plan
      - import-apply
      - normal-plan

  - name: stackPath
    displayName: Terraform stack path
    type: string
    default: stacks/addons/central-registry-rbac

  - name: terraformVersion
    displayName: Terraform version
    type: string
    default: 1.13.3

variables:
  - group: DATA_SCIENCE_CENTRAL_LZ

  - name: DEPLOY_ENV
    value: central

  - name: AZDO_ENVIRONMENT
    value: data-science-central-registry

  - name: TARGET_SUBSCRIPTION_ID
    value: 5e31240a-3ca1-4c5b-b0f0-57cc61cec9b4

  - name: CENTRAL_REGISTRY_ID
    value: /subscriptions/5e31240a-3ca1-4c5b-b0f0-57cc61cec9b4/resourceGroups/rg-core-central-dslz-westus3/providers/Microsoft.MachineLearningServices/registries/central-ml-registry

  - name: CENTRAL_FOUNDRY_ID
    value: /subscriptions/5e31240a-3ca1-4c5b-b0f0-57cc61cec9b4/resourceGroups/rg-core-central-dslz-westus3/providers/Microsoft.CognitiveServices/accounts/aif-central-dslz-westus3

  - name: DEV_AML_WORKSPACE_MI_OBJECT_ID
    value: 4dcb1e4d-8272-441b-a62b-fcffaf588a7c

  - name: NETWORK_APPROVER_ROLE_NAME
    value: Azure AI Enterprise Network Connection Approver

  - name: TF_IN_AUTOMATION
    value: "true"

pool:
  name: azumanage-flz

stages:
  - stage: GenerateConfig
    displayName: Generate starter config
    dependsOn: []
    condition: eq('${{ parameters.action }}', 'generate-config')
    jobs:
      - job: GenerateConfig
        displayName: Discover existing central RBAC
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: Discover existing central role assignments and generate outputs
            inputs:
              azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
              scriptType: bash
              scriptLocation: inlineScript
              addSpnToEnvironment: true
              inlineScript: |
                set -euo pipefail

                az account set --subscription "$(TARGET_SUBSCRIPTION_ID)"

                mkdir -p "$(Build.ArtifactStagingDirectory)/generated"

                get_assignment_ids() {
                  local assignee="$1"
                  local role="$2"
                  local scope="$3"

                  az role assignment list \
                    --assignee "$assignee" \
                    --role "$role" \
                    --scope "$scope" \
                    --query "[].id" \
                    -o tsv | sed '/^$/d' || true
                }

                mapfile -t REGISTRY_ASSIGNMENT_IDS < <(get_assignment_ids "$(DEV_AML_WORKSPACE_MI_OBJECT_ID)" "$(NETWORK_APPROVER_ROLE_NAME)" "$(CENTRAL_REGISTRY_ID)")
                mapfile -t FOUNDRY_ASSIGNMENT_IDS < <(get_assignment_ids "$(DEV_AML_WORKSPACE_MI_OBJECT_ID)" "$(NETWORK_APPROVER_ROLE_NAME)" "$(CENTRAL_FOUNDRY_ID)")

                REGISTRY_ASSIGNMENT_ID="${REGISTRY_ASSIGNMENT_IDS[0]:-NOT_FOUND}"
                FOUNDRY_ASSIGNMENT_ID="${FOUNDRY_ASSIGNMENT_IDS[0]:-NOT_FOUND}"

                cat > "$(Build.ArtifactStagingDirectory)/generated/dev-central-rbac-discovery.txt" <<EOF
                Dev Central RBAC Reconciliation Discovery

                1. Dev AML workspace managed identity access on central AML Registry
                Scope:
                $(CENTRAL_REGISTRY_ID)

                Principal:
                Dev AML workspace managed identity

                Principal object ID:
                $(DEV_AML_WORKSPACE_MI_OBJECT_ID)

                Expected role:
                $(NETWORK_APPROVER_ROLE_NAME)

                Matching assignment count:
                ${#REGISTRY_ASSIGNMENT_IDS[@]}

                Existing Azure role assignment full resource ID:
                ${REGISTRY_ASSIGNMENT_ID}


                2. Dev AML workspace managed identity access on central Foundry resource
                Scope:
                $(CENTRAL_FOUNDRY_ID)

                Principal:
                Dev AML workspace managed identity

                Principal object ID:
                $(DEV_AML_WORKSPACE_MI_OBJECT_ID)

                Expected role:
                $(NETWORK_APPROVER_ROLE_NAME)

                Matching assignment count:
                ${#FOUNDRY_ASSIGNMENT_IDS[@]}

                Existing Azure role assignment full resource ID:
                ${FOUNDRY_ASSIGNMENT_ID}
                EOF

                cat > "$(Build.ArtifactStagingDirectory)/generated/dev-central-rbac-starter-tfvars-snippet.hcl" <<EOF
                # Starter snippet only.
                # Do not paste blindly.
                # Use only after matching Terraform variables/resources are added to the central RBAC module.

                registry_network_connection_approver_role_assignments = {
                  dev_aml_workspace_identity = {
                    principal_id                     = "$(DEV_AML_WORKSPACE_MI_OBJECT_ID)"
                    principal_type                   = "ServicePrincipal"
                    skip_service_principal_aad_check = true
                  }
                }

                foundry_network_connection_approver_role_assignments = {
                  dev_aml_workspace_identity = {
                    principal_id                     = "$(DEV_AML_WORKSPACE_MI_OBJECT_ID)"
                    principal_type                   = "ServicePrincipal"
                    skip_service_principal_aad_check = true
                  }
                }
                EOF

                cat > "$(Build.ArtifactStagingDirectory)/generated/dev-central-rbac-imports.tf" <<EOF
                # Starter import blocks only.
                # Use only after matching Terraform resources have been added.

                import {
                  to = module.central_registry_rbac.azurerm_role_assignment.registry_network_connection_approver["dev_aml_workspace_identity"]
                  id = "${REGISTRY_ASSIGNMENT_ID}"
                }

                import {
                  to = module.central_registry_rbac.azurerm_role_assignment.foundry_network_connection_approver["dev_aml_workspace_identity"]
                  id = "${FOUNDRY_ASSIGNMENT_ID}"
                }
                EOF

                echo "Generated discovery:"
                cat "$(Build.ArtifactStagingDirectory)/generated/dev-central-rbac-discovery.txt"

                echo ""
                echo "Existing assignments on central AML Registry for Dev AML workspace managed identity:"
                az role assignment list \
                  --assignee "$(DEV_AML_WORKSPACE_MI_OBJECT_ID)" \
                  --scope "$(CENTRAL_REGISTRY_ID)" \
                  --query "[].{role:roleDefinitionName,scope:scope,id:id}" \
                  -o table || true

                echo ""
                echo "Existing assignments on central Foundry resource for Dev AML workspace managed identity:"
                az role assignment list \
                  --assignee "$(DEV_AML_WORKSPACE_MI_OBJECT_ID)" \
                  --scope "$(CENTRAL_FOUNDRY_ID)" \
                  --query "[].{role:roleDefinitionName,scope:scope,id:id}" \
                  -o table || true

          - publish: "$(Build.ArtifactStagingDirectory)/generated"
            artifact: generated-rbac-config
            displayName: Publish generated central RBAC config

  - stage: ImportPlan
    displayName: Import plan
    dependsOn: []
    condition: or(eq('${{ parameters.action }}', 'import-plan'), eq('${{ parameters.action }}', 'import-apply'))
    jobs:
      - job: ImportPlan
        displayName: Generate import blocks and run Terraform plan
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: Install Terraform
            inputs:
              terraformVersion: ${{ parameters.terraformVersion }}

          - task: AzureCLI@2
            displayName: Terraform import plan
            inputs:
              azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
              scriptType: bash
              scriptLocation: inlineScript
              addSpnToEnvironment: true
              inlineScript: |
                set -euo pipefail

                az account set --subscription "$(TARGET_SUBSCRIPTION_ID)"

                STACK_PATH="${{ parameters.stackPath }}"
                STACK_PATH="${STACK_PATH#/}"
                STACK_PATH="${STACK_PATH%/}"

                if [ ! -d "$STACK_PATH" ]; then
                  echo "ERROR: Stack path does not exist: $STACK_PATH"
                  exit 1
                fi

                cd "$STACK_PATH"

                : "${TF_BACKEND_RG:?TF_BACKEND_RG is required}"
                : "${TF_BACKEND_STORAGE:?TF_BACKEND_STORAGE is required}"
                : "${TF_BACKEND_CONTAINER:?TF_BACKEND_CONTAINER is required}"

                KEY="${DEPLOY_ENV}/${STACK_PATH}/terraform.tfstate"

                terraform init -input=false -no-color \
                  -backend-config="resource_group_name=${TF_BACKEND_RG}" \
                  -backend-config="storage_account_name=${TF_BACKEND_STORAGE}" \
                  -backend-config="container_name=${TF_BACKEND_CONTAINER}" \
                  -backend-config="key=${KEY}" \
                  -backend-config="use_azuread_auth=true"

                terraform fmt -check -diff -recursive
                terraform validate -no-color

                require_one_assignment_id() {
                  local assignee="$1"
                  local role="$2"
                  local scope="$3"
                  local label="$4"

                  mapfile -t ids < <(az role assignment list \
                    --assignee "$assignee" \
                    --role "$role" \
                    --scope "$scope" \
                    --query "[].id" \
                    -o tsv | sed '/^$/d' || true)

                  echo "$label matching assignment count: ${#ids[@]}" >&2

                  if [ "${#ids[@]}" -ne 1 ]; then
                    echo "ERROR: Expected exactly one existing role assignment for $label, found ${#ids[@]}." >&2
                    echo "Scope: $scope" >&2
                    echo "Role: $role" >&2
                    echo "Assignee object ID: $assignee" >&2
                    exit 1
                  fi

                  echo "${ids[0]}"
                }

                REGISTRY_ASSIGNMENT_ID="$(require_one_assignment_id "$(DEV_AML_WORKSPACE_MI_OBJECT_ID)" "$(NETWORK_APPROVER_ROLE_NAME)" "$(CENTRAL_REGISTRY_ID)" "Dev AML MI Network Connection Approver on central AML Registry")"
                FOUNDRY_ASSIGNMENT_ID="$(require_one_assignment_id "$(DEV_AML_WORKSPACE_MI_OBJECT_ID)" "$(NETWORK_APPROVER_ROLE_NAME)" "$(CENTRAL_FOUNDRY_ID)" "Dev AML MI Network Connection Approver on central Foundry resource")"

                : > zz_generated_rbac_imports.tf

                if ! terraform state show 'module.central_registry_rbac.azurerm_role_assignment.registry_network_connection_approver["dev_aml_workspace_identity"]' >/dev/null 2>&1; then
                  cat >> zz_generated_rbac_imports.tf <<EOF
                import {
                  to = module.central_registry_rbac.azurerm_role_assignment.registry_network_connection_approver["dev_aml_workspace_identity"]
                  id = "$REGISTRY_ASSIGNMENT_ID"
                }

                EOF
                fi

                if ! terraform state show 'module.central_registry_rbac.azurerm_role_assignment.foundry_network_connection_approver["dev_aml_workspace_identity"]' >/dev/null 2>&1; then
                  cat >> zz_generated_rbac_imports.tf <<EOF
                import {
                  to = module.central_registry_rbac.azurerm_role_assignment.foundry_network_connection_approver["dev_aml_workspace_identity"]
                  id = "$FOUNDRY_ASSIGNMENT_ID"
                }

                EOF
                fi

                echo "Generated import blocks:"
                cat zz_generated_rbac_imports.tf

                terraform plan -no-color -var-file="terraform.tfvars" -out="$(Build.ArtifactStagingDirectory)/tfplan"
                terraform show -no-color "$(Build.ArtifactStagingDirectory)/tfplan" > "$(Build.ArtifactStagingDirectory)/tfplan.txt"

                cp zz_generated_rbac_imports.tf "$(Build.ArtifactStagingDirectory)/zz_generated_rbac_imports.tf"

          - publish: "$(Build.ArtifactStagingDirectory)"
            artifact: tfplan
            displayName: Publish import plan artifact

  - stage: ImportApply
    displayName: Import apply
    dependsOn:
      - ImportPlan
    condition: and(succeeded('ImportPlan'), eq('${{ parameters.action }}', 'import-apply'))
    jobs:
      - deployment: ImportApply
        displayName: Apply import plan
        environment: ${{ variables.AZDO_ENVIRONMENT }}
        pool:
          name: azumanage-flz
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: TerraformInstaller@1
                  displayName: Install Terraform
                  inputs:
                    terraformVersion: ${{ parameters.terraformVersion }}

                - download: current
                  artifact: tfplan
                  displayName: Download import plan artifact

                - task: AzureCLI@2
                  displayName: Terraform apply saved import plan
                  inputs:
                    azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
                    scriptType: bash
                    scriptLocation: inlineScript
                    addSpnToEnvironment: true
                    inlineScript: |
                      set -euo pipefail

                      az account set --subscription "$(TARGET_SUBSCRIPTION_ID)"

                      STACK_PATH="${{ parameters.stackPath }}"
                      STACK_PATH="${STACK_PATH#/}"
                      STACK_PATH="${STACK_PATH%/}"

                      if [ ! -d "$STACK_PATH" ]; then
                        echo "ERROR: Stack path does not exist: $STACK_PATH"
                        exit 1
                      fi

                      cd "$STACK_PATH"

                      if [ ! -f "$(Pipeline.Workspace)/tfplan/tfplan" ]; then
                        echo "ERROR: Saved tfplan artifact not found at $(Pipeline.Workspace)/tfplan/tfplan"
                        echo "Contents of tfplan artifact directory:"
                        ls -la "$(Pipeline.Workspace)/tfplan" || true
                        exit 1
                      fi

                      if [ -f "$(Pipeline.Workspace)/tfplan/zz_generated_rbac_imports.tf" ]; then
                        cp "$(Pipeline.Workspace)/tfplan/zz_generated_rbac_imports.tf" ./zz_generated_rbac_imports.tf
                      else
                        echo "ERROR: zz_generated_rbac_imports.tf not found in tfplan artifact."
                        echo "Contents of tfplan artifact directory:"
                        ls -la "$(Pipeline.Workspace)/tfplan" || true
                        exit 1
                      fi

                      : "${TF_BACKEND_RG:?TF_BACKEND_RG is required}"
                      : "${TF_BACKEND_STORAGE:?TF_BACKEND_STORAGE is required}"
                      : "${TF_BACKEND_CONTAINER:?TF_BACKEND_CONTAINER is required}"

                      KEY="${DEPLOY_ENV}/${STACK_PATH}/terraform.tfstate"

                      terraform init -input=false -no-color \
                        -backend-config="resource_group_name=${TF_BACKEND_RG}" \
                        -backend-config="storage_account_name=${TF_BACKEND_STORAGE}" \
                        -backend-config="container_name=${TF_BACKEND_CONTAINER}" \
                        -backend-config="key=${KEY}" \
                        -backend-config="use_azuread_auth=true"

                      terraform apply -no-color -auto-approve "$(Pipeline.Workspace)/tfplan/tfplan"

  - stage: NormalPlan
    displayName: Normal plan after reconciliation
    dependsOn: []
    condition: eq('${{ parameters.action }}', 'normal-plan')
    jobs:
      - job: NormalPlan
        displayName: Normal Terraform plan
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: Install Terraform
            inputs:
              terraformVersion: ${{ parameters.terraformVersion }}

          - task: AzureCLI@2
            displayName: Terraform normal plan
            inputs:
              azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
              scriptType: bash
              scriptLocation: inlineScript
              addSpnToEnvironment: true
              inlineScript: |
                set -euo pipefail

                az account set --subscription "$(TARGET_SUBSCRIPTION_ID)"

                STACK_PATH="${{ parameters.stackPath }}"
                STACK_PATH="${STACK_PATH#/}"
                STACK_PATH="${STACK_PATH%/}"

                if [ ! -d "$STACK_PATH" ]; then
                  echo "ERROR: Stack path does not exist: $STACK_PATH"
                  exit 1
                fi

                cd "$STACK_PATH"

                : "${TF_BACKEND_RG:?TF_BACKEND_RG is required}"
                : "${TF_BACKEND_STORAGE:?TF_BACKEND_STORAGE is required}"
                : "${TF_BACKEND_CONTAINER:?TF_BACKEND_CONTAINER is required}"

                KEY="${DEPLOY_ENV}/${STACK_PATH}/terraform.tfstate"

                terraform init -input=false -no-color \
                  -backend-config="resource_group_name=${TF_BACKEND_RG}" \
                  -backend-config="storage_account_name=${TF_BACKEND_STORAGE}" \
                  -backend-config="container_name=${TF_BACKEND_CONTAINER}" \
                  -backend-config="key=${KEY}" \
                  -backend-config="use_azuread_auth=true"

                terraform fmt -check -diff -recursive
                terraform validate -no-color
                terraform plan -no-color -var-file="terraform.tfvars"
