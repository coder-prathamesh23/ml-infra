trigger: none

parameters:
- name: runMode
  displayName: Run mode
  type: string
  default: normal-plan
  values:
    - validate-manifest
    - import-plan
    - import-apply
    - normal-plan
    - normal-apply

pool:
  name: 'Azure Pipelines'

variables:
  TF_VERSION: '1.14.2'
  TF_DIR: 'shared-app-service'
  AZ_SC_APPLY: 'sc-azudataplatformailzdevapp-ai-apply'

  # Target shared App Service Plan from Colin keep-list
  LOCATION: 'westus3'
  PLAN_RG: 'rg-sub-p-ailz'
  SERVICE_PLAN_NAME: 'ASP-rgsubpailz-917e'

  # Service plan SKU is auto-detected from Azure during plan/import.
  # Do not hardcode EP1/P1/etc. here.
  SERVICE_PLAN_SKU: ''

  # Function App variables are required by variables.tf but not used when ENABLE_STORAGE=false.
  FUNCTION_RG: 'rg-sub-p-ailz'
  FUNCTION_APP_NAME: 'unused-shared-app-service-function'

  ENABLE_STORAGE: 'false'
  STORAGE_ACCOUNT_NAME: ''
  STORAGE_ACCOUNT_KEY: ''

  VNET_INTEGRATION_SUBNET_ID: ''
  PE_SUBNET_ID: ''

  # Local-state handoff using pipeline artifacts
  STATE_DIR: 'statefiles/shared-app-service'
  TFSTATE_ARTIFACT_NAME: 'tfstate-shared-app-service'
  PLAN_ARTIFACT_NAME: 'functionapp-asp-tf-artifact'

  # Reconciliation
  RECONCILIATION_DIR: 'reconciliation/shared-app-service'
  IMPORT_PLAN_ARTIFACT_NAME: 'shared-app-service-import-plan'
  IMPORT_PLAN_READABLE_ARTIFACT_NAME: 'shared-app-service-import-plan-readable'

stages:

# ==========================================
# VALIDATE MANIFEST - shared-app-service
# ==========================================
- stage: ValidateManifest
  displayName: 'VALIDATE shared-app-service manifest'
  dependsOn: []
  condition: eq('${{ parameters.runMode }}', 'validate-manifest')

  jobs:
  - job: validate_manifest
    displayName: 'Validate shared-app-service manifest and state'
    steps:
    - checkout: self

    - template: templates/ensure-az-cli.yml

    - template: templates/bootstrap-terraform.yml
      parameters:
        tfVersion: ${{ variables.TF_VERSION }}
        skipIfPresent: true

    - task: Bash@3
      name: ProbeSeedRun
      displayName: 'Probe for prior shared-app-service tfstate artifact'
      env:
        SYSTEM_ACCESSTOKEN: $(System.AccessToken)
      inputs:
        targetType: inline
        script: |
          set -euo pipefail

          ORG_URL="$(System.CollectionUri)"
          PROJECT="$(System.TeamProject)"
          DEF_ID="$(System.DefinitionId)"
          BRANCH="$(Build.SourceBranch)"
          ARTIFACT_NAME="$(TFSTATE_ARTIFACT_NAME)"
          CURRENT_BUILD_ID="$(Build.BuildId)"

          echo "Looking for latest successful prior run with artifact: $ARTIFACT_NAME"

          command -v jq >/dev/null 2>&1 || { echo "ERROR: jq missing on agent"; exit 1; }

          BUILDS_JSON=$(curl -sS \
            -H "Authorization: Bearer ${SYSTEM_ACCESSTOKEN}" \
            "${ORG_URL}${PROJECT}/_apis/build/builds?definitions=${DEF_ID}&branchName=${BRANCH}&resultFilter=succeeded&queryOrder=finishTimeDescending&%24top=50&api-version=7.1-preview.7")

          BUILD_IDS=$(echo "$BUILDS_JSON" | jq -r '.value[].id')
          SEED_RUN_ID="none"

          for BID in $BUILD_IDS; do
            if [ "$BID" = "$CURRENT_BUILD_ID" ]; then
              continue
            fi

            ART_JSON=$(curl -sS \
              -H "Authorization: Bearer ${SYSTEM_ACCESSTOKEN}" \
              "${ORG_URL}${PROJECT}/_apis/build/builds/${BID}/artifacts?api-version=7.1-preview.5")

            MATCH=$(echo "$ART_JSON" | jq -r --arg N "$ARTIFACT_NAME" '.value[]?.name | select(.==$N)' | head -n1 || true)

            if [ -n "$MATCH" ]; then
              echo "Found state artifact in run: $BID"
              SEED_RUN_ID="$BID"
              break
            fi
          done

          echo "SeedRunId: $SEED_RUN_ID"
          echo "##vso[task.setvariable variable=SeedRunId]$SEED_RUN_ID"

    - task: DownloadPipelineArtifact@2
      displayName: 'Restore previous shared-app-service state artifact'
      condition: and(succeeded(), ne(variables.SeedRunId, 'none'))
      inputs:
        buildType: 'specific'
        project: '$(System.TeamProject)'
        definition: '$(System.DefinitionId)'
        buildVersionToDownload: 'specific'
        pipelineId: '$(SeedRunId)'
        artifactName: '$(TFSTATE_ARTIFACT_NAME)'
        targetPath: '$(System.DefaultWorkingDirectory)/$(STATE_DIR)'
      continueOnError: true

    - task: AzureCLI@2
      displayName: 'Validate manifest resources and state presence'
      inputs:
        azureSubscription: $(AZ_SC_APPLY)
        scriptType: bash
        scriptLocation: inlineScript
        workingDirectory: $(System.DefaultWorkingDirectory)
        inlineScript: |
          set -euo pipefail

          OUTDIR="$(Build.ArtifactStagingDirectory)/validated-manifest"
          REPO_ROOT="$(System.DefaultWorkingDirectory)"
          MANIFEST="$REPO_ROOT/$(RECONCILIATION_DIR)/import-manifest.csv"

          mkdir -p "$OUTDIR"

          command -v az >/dev/null 2>&1 || { echo "ERROR: AZ CLI missing"; exit 1; }
          command -v terraform >/dev/null 2>&1 || { echo "ERROR: Terraform missing"; exit 1; }

          export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
          export ARM_TENANT_ID="$(az account show --query tenantId -o tsv)"
          export ARM_USE_OIDC=true
          export ARM_CLIENT_ID="$(az account show --query user.name -o tsv)"
          export TF_IN_AUTOMATION=1

          echo "Azure account context:"
          az account show -o table | tee "$OUTDIR/az_account_context.txt"

          if [ ! -f "$MANIFEST" ]; then
            echo "ERROR: Manifest not found: $MANIFEST"
            exit 1
          fi

          echo "Manifest content:"
          nl -ba "$MANIFEST" | tee "$OUTDIR/manifest_content.txt"

          if [ ! -d "$(TF_DIR)" ]; then
            echo "ERROR: Terraform folder not found: $(TF_DIR)"
            exit 1
          fi

          mkdir -p "$(STATE_DIR)" "$(TF_DIR)"

          if [ -f "$(STATE_DIR)/terraform.tfstate" ]; then
            cp "$(STATE_DIR)/terraform.tfstate" "$(TF_DIR)/terraform.tfstate"
          fi

          if [ -f "$(STATE_DIR)/terraform.tfstate.backup" ]; then
            cp "$(STATE_DIR)/terraform.tfstate.backup" "$(TF_DIR)/terraform.tfstate.backup"
          fi

          ROWS_FILE="$OUTDIR/manifest_rows.tsv"
          rm -f "$ROWS_FILE"

          awk -F',' '
            NR > 1 {
              gsub(/\r/, "", $0)
              if ($2 != "" && $4 != "") {
                print $2 "\t" $4
              }
            }
          ' "$MANIFEST" > "$ROWS_FILE"

          echo "Parsed manifest rows:"
          cat "$ROWS_FILE" | tee "$OUTDIR/parsed_manifest_rows.txt"

          if [ ! -s "$ROWS_FILE" ]; then
            echo "ERROR: No valid manifest rows found."
            exit 2
          fi

          echo "Validating Azure resource IDs from manifest..."

          while IFS=$'\t' read -r TF_ADDRESS RESOURCE_ID
          do
            echo "--------------------------------------------------"
            echo "Terraform address: $TF_ADDRESS"
            echo "Azure resource ID: $RESOURCE_ID"

            SAFE_NAME=$(echo "$TF_ADDRESS" | tr '.[]/' '____')

            az resource show \
              --ids "$RESOURCE_ID" \
              -o json > "$OUTDIR/${SAFE_NAME}.resource.json"

            echo "AZURE_EXISTS: $TF_ADDRESS"
          done < "$ROWS_FILE"

          cd "$(TF_DIR)"

          mkdir -p .backend_disabled
          for f in $(grep -rl 'backend *"azurerm"' . || true); do
            mv "$f" ".backend_disabled/$(basename "$f")"
          done

          terraform init -backend=false -input=false 2>&1 | tee "$OUTDIR/terraform_init.txt"

          echo "Current Terraform state list:"
          terraform state list 2>/dev/null | tee "$OUTDIR/terraform_state_list.txt" || true

          STATE_CHECK_FILE="$OUTDIR/state_check_summary.tsv"
          echo -e "tf_address\tazure_exists\tstate_status\tnext_action" > "$STATE_CHECK_FILE"

          while IFS=$'\t' read -r TF_ADDRESS RESOURCE_ID
          do
            if terraform state list 2>/dev/null | grep -Fxq "$TF_ADDRESS"; then
              echo "IN_STATE: $TF_ADDRESS"
              echo -e "$TF_ADDRESS\ttrue\tIN_STATE\tSKIP_IMPORT" >> "$STATE_CHECK_FILE"
            else
              echo "NOT_IN_STATE: $TF_ADDRESS"
              echo -e "$TF_ADDRESS\ttrue\tNOT_IN_STATE\tPROCEED_TO_IMPORT_PLAN" >> "$STATE_CHECK_FILE"
            fi
          done < "$ROWS_FILE"

          echo "State check summary:"
          cat "$STATE_CHECK_FILE"

    - task: PublishPipelineArtifact@1
      displayName: 'Publish shared-app-service validation output'
      condition: always()
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)/validated-manifest'
        artifact: 'shared-app-service-validated-manifest'

# ==========================================
# IMPORT PLAN - shared-app-service
# ==========================================
- stage: ImportPlan
  displayName: 'IMPORT PLAN - shared-app-service'
  dependsOn: []
  condition: eq('${{ parameters.runMode }}', 'import-plan')

  jobs:
  - job: import_plan
    displayName: 'Terraform import plan - shared-app-service'
    steps:
    - checkout: self

    - template: templates/ensure-az-cli.yml

    - template: templates/bootstrap-terraform.yml
      parameters:
        tfVersion: ${{ variables.TF_VERSION }}
        skipIfPresent: true

    - task: Bash@3
      name: ProbeSeedRun
      displayName: 'Probe for prior shared-app-service tfstate artifact'
      env:
        SYSTEM_ACCESSTOKEN: $(System.AccessToken)
      inputs:
        targetType: inline
        script: |
          set -euo pipefail

          ORG_URL="$(System.CollectionUri)"
          PROJECT="$(System.TeamProject)"
          DEF_ID="$(System.DefinitionId)"
          BRANCH="$(Build.SourceBranch)"
          ARTIFACT_NAME="$(TFSTATE_ARTIFACT_NAME)"
          CURRENT_BUILD_ID="$(Build.BuildId)"

          echo "Looking for latest successful prior run with artifact: $ARTIFACT_NAME"

          command -v jq >/dev/null 2>&1 || { echo "ERROR: jq missing on agent"; exit 1; }

          BUILDS_JSON=$(curl -sS \
            -H "Authorization: Bearer ${SYSTEM_ACCESSTOKEN}" \
            "${ORG_URL}${PROJECT}/_apis/build/builds?definitions=${DEF_ID}&branchName=${BRANCH}&resultFilter=succeeded&queryOrder=finishTimeDescending&%24top=50&api-version=7.1-preview.7")

          BUILD_IDS=$(echo "$BUILDS_JSON" | jq -r '.value[].id')
          SEED_RUN_ID="none"

          for BID in $BUILD_IDS; do
            if [ "$BID" = "$CURRENT_BUILD_ID" ]; then
              continue
            fi

            ART_JSON=$(curl -sS \
              -H "Authorization: Bearer ${SYSTEM_ACCESSTOKEN}" \
              "${ORG_URL}${PROJECT}/_apis/build/builds/${BID}/artifacts?api-version=7.1-preview.5")

            MATCH=$(echo "$ART_JSON" | jq -r --arg N "$ARTIFACT_NAME" '.value[]?.name | select(.==$N)' | head -n1 || true)

            if [ -n "$MATCH" ]; then
              echo "Found state artifact in run: $BID"
              SEED_RUN_ID="$BID"
              break
            fi
          done

          echo "SeedRunId: $SEED_RUN_ID"
          echo "##vso[task.setvariable variable=SeedRunId]$SEED_RUN_ID"

    - task: DownloadPipelineArtifact@2
      displayName: 'Restore previous shared-app-service state artifact'
      condition: and(succeeded(), ne(variables.SeedRunId, 'none'))
      inputs:
        buildType: 'specific'
        project: '$(System.TeamProject)'
        definition: '$(System.DefinitionId)'
        buildVersionToDownload: 'specific'
        pipelineId: '$(SeedRunId)'
        artifactName: '$(TFSTATE_ARTIFACT_NAME)'
        targetPath: '$(System.DefaultWorkingDirectory)/$(STATE_DIR)'
      continueOnError: true

    - task: AzureCLI@2
      displayName: 'Terraform import plan - shared-app-service'
      inputs:
        azureSubscription: $(AZ_SC_APPLY)
        scriptType: bash
        scriptLocation: inlineScript
        workingDirectory: $(System.DefaultWorkingDirectory)
        inlineScript: |
          set -euo pipefail

          OUTDIR="$(Build.ArtifactStagingDirectory)/import-plan"
          REPO_ROOT="$(System.DefaultWorkingDirectory)"
          MANIFEST="$REPO_ROOT/$(RECONCILIATION_DIR)/import-manifest.csv"

          mkdir -p "$OUTDIR"

          command -v az >/dev/null 2>&1 || { echo "ERROR: AZ CLI missing"; exit 1; }
          command -v terraform >/dev/null 2>&1 || { echo "ERROR: Terraform missing"; exit 1; }

          export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
          export ARM_TENANT_ID="$(az account show --query tenantId -o tsv)"
          export ARM_USE_OIDC=true
          export ARM_CLIENT_ID="$(az account show --query user.name -o tsv)"
          export TF_IN_AUTOMATION=1

          if [ ! -f "$MANIFEST" ]; then
            echo "ERROR: Manifest not found: $MANIFEST"
            exit 1
          fi

          mkdir -p "$(STATE_DIR)" "$(TF_DIR)"

          if [ -f "$(STATE_DIR)/terraform.tfstate" ]; then
            cp "$(STATE_DIR)/terraform.tfstate" "$(TF_DIR)/terraform.tfstate"
          fi

          if [ -f "$(STATE_DIR)/terraform.tfstate.backup" ]; then
            cp "$(STATE_DIR)/terraform.tfstate.backup" "$(TF_DIR)/terraform.tfstate.backup"
          fi

          cd "$(TF_DIR)"

          mkdir -p .backend_disabled
          for f in $(grep -rl 'backend *"azurerm"' . || true); do
            mv "$f" ".backend_disabled/$(basename "$f")"
          done

          terraform init -backend=false -input=false 2>&1 | tee "$OUTDIR/terraform_init.txt"

          echo "Detecting existing App Service Plan configuration from Azure"

          PLAN_ID=$(az resource show \
            --resource-group "$(PLAN_RG)" \
            --name "$(SERVICE_PLAN_NAME)" \
            --resource-type "Microsoft.Web/serverfarms" \
            --query id -o tsv)

          PLAN_ID_CANON=$(echo "$PLAN_ID" | sed 's#/providers/Microsoft\.Web/serverfarms/#/providers/Microsoft.Web/serverFarms/#')

          PLAN_LOCATION=$(az resource show --ids "$PLAN_ID_CANON" --query location -o tsv)
          PLAN_SKU=$(az resource show --ids "$PLAN_ID_CANON" --query sku.name -o tsv)
          PLAN_TAGS=$(az resource show --ids "$PLAN_ID_CANON" --query tags -o json)

          if [ -z "$PLAN_SKU" ] || [ "$PLAN_SKU" = "null" ]; then
            echo "ERROR: Could not detect App Service Plan SKU from Azure."
            exit 31
          fi

          if [ -z "$PLAN_TAGS" ] || [ "$PLAN_TAGS" = "null" ]; then
            PLAN_TAGS="{}"
          fi

          echo "Detected App Service Plan:"
          echo "PLAN_ID=$PLAN_ID_CANON"
          echo "PLAN_LOCATION=$PLAN_LOCATION"
          echo "PLAN_SKU=$PLAN_SKU"
          echo "PLAN_TAGS=$PLAN_TAGS"

          export TF_VAR_resource_group_name="$(PLAN_RG)"
          export TF_VAR_location="$PLAN_LOCATION"
          export TF_VAR_service_plan_name="$(SERVICE_PLAN_NAME)"
          export TF_VAR_service_plan_sku="$PLAN_SKU"
          export TF_VAR_tags="$PLAN_TAGS"

          export TF_VAR_function_app_name="$(FUNCTION_APP_NAME)"
          export TF_VAR_function_resource_group_name="$(FUNCTION_RG)"
          export TF_VAR_storage_enabled=false
          export TF_VAR_storage_account_name=""
          export TF_VAR_storage_account_access_key=""
          export TF_VAR_functions_extension_version="~4"
          export TF_VAR_python_version="3.11"
          export TF_VAR_vnet_integration_subnet_id=""
          export TF_VAR_private_endpoint_subnet_id=""

          echo "Creating import blocks from manifest"
          rm -f imports.auto.tf

          awk -F',' '
            NR > 1 {
              gsub(/\r/, "", $0)
              if ($2 != "" && $4 != "") {
                print "import {"
                print "  to = " $2
                print "  id = \"" $4 "\""
                print "}"
                print ""
              }
            }
          ' "$MANIFEST" > imports.auto.tf

          echo "Generated imports.auto.tf:"
          cat imports.auto.tf | tee "$OUTDIR/imports.auto.tf"

          if ! grep -q '^import {' imports.auto.tf; then
            echo "ERROR: imports.auto.tf is empty."
            exit 22
          fi

          echo "Running Terraform import plan"
          set +e
          terraform plan -no-color -input=false -lock=false -out=tfplan 2>&1 | tee "$OUTDIR/terraform_import_plan.txt"
          PLAN_EXIT=${PIPESTATUS[0]}
          set -e

          echo "$PLAN_EXIT" > "$OUTDIR/plan_exit_code.txt"
          echo "Terraform plan exit code: $PLAN_EXIT"

          if [ "$PLAN_EXIT" -ne 0 ]; then
            echo "ERROR: terraform import plan failed."
            exit "$PLAN_EXIT"
          fi

          echo "Checking import plan for unsafe actions"

          if grep -E "will be created|will be updated in-place|must be replaced|will be destroyed" "$OUTDIR/terraform_import_plan.txt"; then
            echo "ERROR: Import plan contains create/update/replace/destroy actions. Do not apply."
            exit 1
          fi

          if grep -E "Plan: .* [1-9][0-9]* to add|Plan: .* [1-9][0-9]* to change|Plan: .* [1-9][0-9]* to destroy" "$OUTDIR/terraform_import_plan.txt"; then
            echo "ERROR: Import plan contains add/change/destroy counts. Do not apply."
            exit 1
          fi

          if ! grep -q "to import" "$OUTDIR/terraform_import_plan.txt"; then
            echo "ERROR: No imports detected in import plan."
            exit 1
          fi

          echo "Import plan is safe."

          BUNDLE_FILES=("tfplan" "imports.auto.tf")

          if [ -f "terraform.tfstate" ]; then
            BUNDLE_FILES+=("terraform.tfstate")
          fi

          if [ -f "terraform.tfstate.backup" ]; then
            BUNDLE_FILES+=("terraform.tfstate.backup")
          fi

          tar czf tfbundle-import.tgz "${BUNDLE_FILES[@]}"

    - publish: '$(System.DefaultWorkingDirectory)/$(TF_DIR)/tfbundle-import.tgz'
      artifact: '$(IMPORT_PLAN_ARTIFACT_NAME)'

    - task: PublishPipelineArtifact@1
      displayName: 'Publish readable import-plan logs'
      condition: always()
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)/import-plan'
        artifact: '$(IMPORT_PLAN_READABLE_ARTIFACT_NAME)'

# ==========================================
# IMPORT APPLY - shared-app-service
# ==========================================
- stage: ImportApply
  displayName: 'IMPORT APPLY - shared-app-service'
  dependsOn: []
  condition: eq('${{ parameters.runMode }}', 'import-apply')

  jobs:
  - job: import_apply
    displayName: 'Terraform import apply - shared-app-service'
    steps:
    - checkout: self

    - template: templates/ensure-az-cli.yml

    - template: templates/bootstrap-terraform.yml
      parameters:
        tfVersion: ${{ variables.TF_VERSION }}
        skipIfPresent: true

    - task: Bash@3
      name: ProbeImportPlanRun
      displayName: 'Probe for prior shared-app-service import-plan artifact'
      env:
        SYSTEM_ACCESSTOKEN: $(System.AccessToken)
      inputs:
        targetType: inline
        script: |
          set -euo pipefail

          ORG_URL="$(System.CollectionUri)"
          PROJECT="$(System.TeamProject)"
          DEF_ID="$(System.DefinitionId)"
          BRANCH="$(Build.SourceBranch)"
          ARTIFACT_NAME="$(IMPORT_PLAN_ARTIFACT_NAME)"
          CURRENT_BUILD_ID="$(Build.BuildId)"

          echo "Looking for latest successful run with import plan artifact: $ARTIFACT_NAME"

          command -v jq >/dev/null 2>&1 || { echo "ERROR: jq missing on agent"; exit 1; }

          BUILDS_JSON=$(curl -sS \
            -H "Authorization: Bearer ${SYSTEM_ACCESSTOKEN}" \
            "${ORG_URL}${PROJECT}/_apis/build/builds?definitions=${DEF_ID}&branchName=${BRANCH}&resultFilter=succeeded&queryOrder=finishTimeDescending&%24top=50&api-version=7.1-preview.7")

          BUILD_IDS=$(echo "$BUILDS_JSON" | jq -r '.value[].id')
          IMPORT_PLAN_RUN_ID="none"

          for BID in $BUILD_IDS; do
            if [ "$BID" = "$CURRENT_BUILD_ID" ]; then
              continue
            fi

            ART_JSON=$(curl -sS \
              -H "Authorization: Bearer ${SYSTEM_ACCESSTOKEN}" \
              "${ORG_URL}${PROJECT}/_apis/build/builds/${BID}/artifacts?api-version=7.1-preview.5")

            MATCH=$(echo "$ART_JSON" | jq -r --arg N "$ARTIFACT_NAME" '.value[]?.name | select(.==$N)' | head -n1 || true)

            if [ -n "$MATCH" ]; then
              echo "Found import-plan artifact in run: $BID"
              IMPORT_PLAN_RUN_ID="$BID"
              break
            fi
          done

          if [ "$IMPORT_PLAN_RUN_ID" = "none" ]; then
            echo "ERROR: No prior successful import-plan artifact found."
            exit 1
          fi

          echo "ImportPlanRunId: $IMPORT_PLAN_RUN_ID"
          echo "##vso[task.setvariable variable=ImportPlanRunId]$IMPORT_PLAN_RUN_ID"

    - task: DownloadPipelineArtifact@2
      displayName: 'Download shared-app-service import-plan artifact'
      inputs:
        buildType: 'specific'
        project: '$(System.TeamProject)'
        definition: '$(System.DefinitionId)'
        buildVersionToDownload: 'specific'
        pipelineId: '$(ImportPlanRunId)'
        artifactName: '$(IMPORT_PLAN_ARTIFACT_NAME)'
        targetPath: '$(Pipeline.Workspace)/$(IMPORT_PLAN_ARTIFACT_NAME)'
      continueOnError: false

    - task: Bash@3
      displayName: 'Extract shared-app-service import-plan bundle'
      inputs:
        workingDirectory: $(System.DefaultWorkingDirectory)
        targetType: inline
        script: |
          set -euo pipefail

          if [ ! -f "$(Pipeline.Workspace)/$(IMPORT_PLAN_ARTIFACT_NAME)/tfbundle-import.tgz" ]; then
            echo "ERROR: tfbundle-import.tgz not found."
            exit 1
          fi

          mkdir -p "$(TF_DIR)"
          tar xzf "$(Pipeline.Workspace)/$(IMPORT_PLAN_ARTIFACT_NAME)/tfbundle-import.tgz" -C "$(TF_DIR)"

          ls -la "$(TF_DIR)"

          if [ ! -f "$(TF_DIR)/tfplan" ]; then
            echo "ERROR: tfplan not found after extracting bundle."
            exit 1
          fi

    - task: AzureCLI@2
      displayName: 'Terraform apply saved import plan'
      inputs:
        azureSubscription: $(AZ_SC_APPLY)
        scriptType: bash
        scriptLocation: inlineScript
        workingDirectory: $(System.DefaultWorkingDirectory)
        inlineScript: |
          set -euo pipefail

          export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
          export ARM_TENANT_ID="$(az account show --query tenantId -o tsv)"
          export ARM_USE_OIDC=true
          export ARM_CLIENT_ID="$(az account show --query user.name -o tsv)"
          export TF_IN_AUTOMATION=1

          cd "$(TF_DIR)"

          mkdir -p .backend_disabled
          for f in $(grep -rl 'backend *"azurerm"' . || true); do
            mv "$f" ".backend_disabled/$(basename "$f")"
          done

          terraform init -backend=false -input=false

          echo "Applying saved import plan"
          terraform apply -input=false tfplan

          echo "State after import apply:"
          terraform state list

          cd ..
          mkdir -p "$(STATE_DIR)"

          if [ -f "$(TF_DIR)/terraform.tfstate" ]; then
            cp "$(TF_DIR)/terraform.tfstate" "$(STATE_DIR)/terraform.tfstate"
          fi

          if [ -f "$(TF_DIR)/terraform.tfstate.backup" ]; then
            cp "$(TF_DIR)/terraform.tfstate.backup" "$(STATE_DIR)/terraform.tfstate.backup"
          fi

    - publish: '$(System.DefaultWorkingDirectory)/$(STATE_DIR)'
      artifact: '$(TFSTATE_ARTIFACT_NAME)'
      displayName: 'Publish shared-app-service statefiles after import'
      condition: always()

# ==========================================
# NORMAL PLAN - shared-app-service
# ==========================================
- stage: Plan
  displayName: 'NORMAL PLAN - shared-app-service'
  dependsOn: []
  condition: or(eq('${{ parameters.runMode }}', 'normal-plan'), eq('${{ parameters.runMode }}', 'normal-apply'))

  jobs:
  - job: plan
    displayName: 'Terraform PLAN'
    steps:
    - checkout: self

    - template: templates/ensure-az-cli.yml

    - template: templates/bootstrap-terraform.yml
      parameters:
        tfVersion: ${{ variables.TF_VERSION }}
        skipIfPresent: true

    - task: Bash@3
      name: ProbeSeedRun
      displayName: 'Probe for prior shared-app-service tfstate artifact'
      env:
        SYSTEM_ACCESSTOKEN: $(System.AccessToken)
      inputs:
        targetType: inline
        script: |
          set -euo pipefail

          ORG_URL="$(System.CollectionUri)"
          PROJECT="$(System.TeamProject)"
          DEF_ID="$(System.DefinitionId)"
          BRANCH="$(Build.SourceBranch)"
          ARTIFACT_NAME="$(TFSTATE_ARTIFACT_NAME)"
          CURRENT_BUILD_ID="$(Build.BuildId)"

          echo "Looking for latest successful prior run with artifact: $ARTIFACT_NAME"

          command -v jq >/dev/null 2>&1 || { echo "ERROR: jq missing on agent"; exit 1; }

          BUILDS_JSON=$(curl -sS \
            -H "Authorization: Bearer ${SYSTEM_ACCESSTOKEN}" \
            "${ORG_URL}${PROJECT}/_apis/build/builds?definitions=${DEF_ID}&branchName=${BRANCH}&resultFilter=succeeded&queryOrder=finishTimeDescending&%24top=50&api-version=7.1-preview.7")

          BUILD_IDS=$(echo "$BUILDS_JSON" | jq -r '.value[].id')
          SEED_RUN_ID="none"

          for BID in $BUILD_IDS; do
            if [ "$BID" = "$CURRENT_BUILD_ID" ]; then
              continue
            fi

            ART_JSON=$(curl -sS \
              -H "Authorization: Bearer ${SYSTEM_ACCESSTOKEN}" \
              "${ORG_URL}${PROJECT}/_apis/build/builds/${BID}/artifacts?api-version=7.1-preview.5")

            MATCH=$(echo "$ART_JSON" | jq -r --arg N "$ARTIFACT_NAME" '.value[]?.name | select(.==$N)' | head -n1 || true)

            if [ -n "$MATCH" ]; then
              echo "Found state artifact in run: $BID"
              SEED_RUN_ID="$BID"
              break
            fi
          done

          echo "SeedRunId: $SEED_RUN_ID"
          echo "##vso[task.setvariable variable=SeedRunId]$SEED_RUN_ID"

    - task: DownloadPipelineArtifact@2
      displayName: 'Restore previous shared-app-service state artifact'
      condition: and(succeeded(), ne(variables.SeedRunId, 'none'))
      inputs:
        buildType: 'specific'
        project: '$(System.TeamProject)'
        definition: '$(System.DefinitionId)'
        buildVersionToDownload: 'specific'
        pipelineId: '$(SeedRunId)'
        artifactName: '$(TFSTATE_ARTIFACT_NAME)'
        targetPath: '$(System.DefaultWorkingDirectory)/$(STATE_DIR)'
      continueOnError: true

    - task: AzureCLI@2
      displayName: 'Terraform init + normal plan'
      inputs:
        azureSubscription: $(AZ_SC_APPLY)
        scriptType: bash
        scriptLocation: inlineScript
        workingDirectory: $(System.DefaultWorkingDirectory)
        inlineScript: |
          set -euo pipefail

          export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
          export ARM_TENANT_ID="$(az account show --query tenantId -o tsv)"
          export ARM_USE_OIDC=true
          export ARM_CLIENT_ID="$(az account show --query user.name -o tsv)"
          export TF_IN_AUTOMATION=1

          mkdir -p "$(STATE_DIR)" "$(TF_DIR)"

          if [ -f "$(STATE_DIR)/terraform.tfstate" ]; then
            cp "$(STATE_DIR)/terraform.tfstate" "$(TF_DIR)/terraform.tfstate"
          fi

          if [ -f "$(STATE_DIR)/terraform.tfstate.backup" ]; then
            cp "$(STATE_DIR)/terraform.tfstate.backup" "$(TF_DIR)/terraform.tfstate.backup"
          fi

          cd "$(TF_DIR)"

          mkdir -p .backend_disabled
          for f in $(grep -rl 'backend *"azurerm"' . || true); do
            mv "$f" ".backend_disabled/$(basename "$f")"
          done

          terraform init -backend=false -input=false

          echo "Detecting existing App Service Plan configuration from Azure"

          PLAN_ID=$(az resource show \
            --resource-group "$(PLAN_RG)" \
            --name "$(SERVICE_PLAN_NAME)" \
            --resource-type "Microsoft.Web/serverfarms" \
            --query id -o tsv)

          PLAN_ID_CANON=$(echo "$PLAN_ID" | sed 's#/providers/Microsoft\.Web/serverfarms/#/providers/Microsoft.Web/serverFarms/#')

          PLAN_LOCATION=$(az resource show --ids "$PLAN_ID_CANON" --query location -o tsv)
          PLAN_SKU=$(az resource show --ids "$PLAN_ID_CANON" --query sku.name -o tsv)
          PLAN_TAGS=$(az resource show --ids "$PLAN_ID_CANON" --query tags -o json)

          if [ -z "$PLAN_SKU" ] || [ "$PLAN_SKU" = "null" ]; then
            echo "ERROR: Could not detect App Service Plan SKU from Azure."
            exit 31
          fi

          if [ -z "$PLAN_TAGS" ] || [ "$PLAN_TAGS" = "null" ]; then
            PLAN_TAGS="{}"
          fi

          echo "Detected App Service Plan:"
          echo "PLAN_ID=$PLAN_ID_CANON"
          echo "PLAN_LOCATION=$PLAN_LOCATION"
          echo "PLAN_SKU=$PLAN_SKU"
          echo "PLAN_TAGS=$PLAN_TAGS"

          export TF_VAR_resource_group_name="$(PLAN_RG)"
          export TF_VAR_location="$PLAN_LOCATION"
          export TF_VAR_service_plan_name="$(SERVICE_PLAN_NAME)"
          export TF_VAR_service_plan_sku="$PLAN_SKU"
          export TF_VAR_tags="$PLAN_TAGS"

          export TF_VAR_function_app_name="$(FUNCTION_APP_NAME)"
          export TF_VAR_function_resource_group_name="$(FUNCTION_RG)"
          export TF_VAR_storage_enabled=false
          export TF_VAR_storage_account_name=""
          export TF_VAR_storage_account_access_key=""
          export TF_VAR_functions_extension_version="~4"
          export TF_VAR_python_version="3.11"
          export TF_VAR_vnet_integration_subnet_id=""
          export TF_VAR_private_endpoint_subnet_id=""

          echo "Running Terraform normal plan"
          terraform plan -input=false -lock=false -out=tfplan

          cd ..
          mkdir -p "$(STATE_DIR)"

          if [ -f "$(TF_DIR)/terraform.tfstate" ]; then
            cp "$(TF_DIR)/terraform.tfstate" "$(STATE_DIR)/terraform.tfstate"
          fi

          if [ -f "$(TF_DIR)/terraform.tfstate.backup" ]; then
            cp "$(TF_DIR)/terraform.tfstate.backup" "$(STATE_DIR)/terraform.tfstate.backup"
          fi

          cd "$(TF_DIR)"
          tar czf tfbundle.tgz tfplan terraform.tfstate* 2>/dev/null || tar czf tfbundle.tgz tfplan

    - task: PublishPipelineArtifact@1
      displayName: 'Publish TF bundle'
      inputs:
        targetPath: '$(System.DefaultWorkingDirectory)/$(TF_DIR)/tfbundle.tgz'
        artifact: '$(PLAN_ARTIFACT_NAME)'

# ==========================================
# NORMAL APPLY - shared-app-service
# ==========================================
- stage: Apply
  displayName: 'NORMAL APPLY - shared-app-service'
  dependsOn: Plan
  condition: and(succeeded('Plan'), eq('${{ parameters.runMode }}', 'normal-apply'))

  jobs:
  - job: apply
    displayName: 'Terraform APPLY'
    steps:
    - checkout: self

    - task: DownloadPipelineArtifact@2
      displayName: 'Download TF bundle'
      inputs:
        buildType: 'current'
        artifactName: '$(PLAN_ARTIFACT_NAME)'
        targetPath: '$(Pipeline.Workspace)/$(PLAN_ARTIFACT_NAME)'

    - task: Bash@3
      displayName: 'Extract plan bundle'
      inputs:
        targetType: inline
        workingDirectory: '$(System.DefaultWorkingDirectory)'
        script: |
          set -euo pipefail
          mkdir -p "$(TF_DIR)"
          tar xzf "$(Pipeline.Workspace)/$(PLAN_ARTIFACT_NAME)/tfbundle.tgz" -C "$(TF_DIR)"

    - template: templates/ensure-az-cli.yml

    - template: templates/bootstrap-terraform.yml
      parameters:
        tfVersion: ${{ variables.TF_VERSION }}
        skipIfPresent: true

    - task: AzureCLI@2
      displayName: 'terraform apply'
      inputs:
        azureSubscription: $(AZ_SC_APPLY)
        scriptType: bash
        scriptLocation: inlineScript
        workingDirectory: $(System.DefaultWorkingDirectory)
        inlineScript: |
          set -euo pipefail

          export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
          export ARM_TENANT_ID="$(az account show --query tenantId -o tsv)"
          export ARM_USE_OIDC=true
          export ARM_CLIENT_ID="$(az account show --query user.name -o tsv)"
          export TF_IN_AUTOMATION=1

          cd "$(TF_DIR)"

          terraform init -backend=false -input=false
          terraform apply -input=false tfplan

          cd ..
          mkdir -p "$(STATE_DIR)"

          if [ -f "$(TF_DIR)/terraform.tfstate" ]; then
            cp "$(TF_DIR)/terraform.tfstate" "$(STATE_DIR)/terraform.tfstate"
          fi

          if [ -f "$(TF_DIR)/terraform.tfstate.backup" ]; then
            cp "$(TF_DIR)/terraform.tfstate.backup" "$(STATE_DIR)/terraform.tfstate.backup"
          fi

    - task: PublishPipelineArtifact@1
      displayName: 'Publish statefiles after normal apply'
      condition: always()
      inputs:
        targetPath: '$(System.DefaultWorkingDirectory)/$(STATE_DIR)'
        artifact: '$(TFSTATE_ARTIFACT_NAME)'
