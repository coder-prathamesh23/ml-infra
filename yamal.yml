trigger: none
pr: none

parameters:
  - name: stackPath
    displayName: Stack path
    type: string
    default: stacks/addons/azureml-workspace

  - name: terraformVersion
    displayName: Terraform version
    type: string
    default: 1.7.5

variables:
  - group: DATA_SCIENCE_LZ_DEV

  - name: DEPLOY_ENV
    value: dev

  - name: AZDO_ENVIRONMENT
    value: data-science-lz-dev

  - name: TF_IN_AUTOMATION
    value: "true"

pool:
  name: azumanage-flz

stages:
  - stage: ImportAMLManagedNetworkOutboundRules
    displayName: Import AML managed network outbound rules
    jobs:
      - deployment: ImportRules
        displayName: Import rules into Terraform state
        environment: $(AZDO_ENVIRONMENT)
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: TerraformInstaller@1
                  displayName: Install Terraform
                  inputs:
                    terraformVersion: ${{ parameters.terraformVersion }}

                - task: AzureCLI@2
                  displayName: Terraform import AML outbound rules
                  inputs:
                    azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
                    scriptType: bash
                    scriptLocation: inlineScript
                    addSpnToEnvironment: true
                    inlineScript: |
                      set -euo pipefail

                      : "${AZURE_SERVICE_CONNECTION:?AZURE_SERVICE_CONNECTION is required}"
                      : "${TF_BACKEND_RG:?TF_BACKEND_RG is required}"
                      : "${TF_BACKEND_STORAGE:?TF_BACKEND_STORAGE is required}"
                      : "${TF_BACKEND_CONTAINER:?TF_BACKEND_CONTAINER is required}"
                      : "${DEPLOY_ENV:?DEPLOY_ENV is required}"

                      STACK_PATH="${{ parameters.stackPath }}"
                      STACK_PATH="${STACK_PATH#/}"
                      STACK_PATH="${STACK_PATH%/}"

                      if [ -z "$STACK_PATH" ]; then
                        echo "ERROR: stackPath cannot be empty."
                        exit 1
                      fi

                      if [ ! -d "$STACK_PATH" ]; then
                        echo "ERROR: stackPath '$STACK_PATH' does not exist."
                        exit 1
                      fi

                      cd "$STACK_PATH"

                      if [ ! -f "terraform.tfvars" ]; then
                        echo "ERROR: terraform.tfvars not found in $PWD"
                        exit 1
                      fi

                      KEY_OVERRIDE="${TF_BACKEND_KEY:-}"
                      if [ -n "$KEY_OVERRIDE" ]; then
                        key="$KEY_OVERRIDE"
                      else
                        key="$DEPLOY_ENV/$STACK_PATH/terraform.tfstate"
                      fi

                      echo "Using backend key: $key"

                      ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                      ARM_TENANT_ID="$(az account show --query tenantId -o tsv)"
                      ARM_CLIENT_ID="${servicePrincipalId:-}"

                      export ARM_SUBSCRIPTION_ID ARM_TENANT_ID ARM_CLIENT_ID
                      export ARM_USE_CLI=false

                      if [ -n "${servicePrincipalKey:-}" ]; then
                        export ARM_CLIENT_SECRET="$servicePrincipalKey"
                      elif [ -n "${idToken:-}" ]; then
                        export ARM_USE_OIDC=true
                        export ARM_OIDC_TOKEN="$idToken"
                      else
                        echo "ERROR: AzureCLI@2 did not expose servicePrincipalKey or idToken."
                        exit 1
                      fi

                      terraform init -input=false -no-color \
                        -backend-config="resource_group_name=${TF_BACKEND_RG}" \
                        -backend-config="storage_account_name=${TF_BACKEND_STORAGE}" \
                        -backend-config="container_name=${TF_BACKEND_CONTAINER}" \
                        -backend-config="key=${key}" \
                        -backend-config="use_azuread_auth=true"

                      terraform validate -no-color

                      if [ -n "${AML_WORKSPACE_ID:-}" ]; then
                        workspace_id="$AML_WORKSPACE_ID"
                      else
                        : "${AML_WORKSPACE_RG:?AML_WORKSPACE_RG is required when AML_WORKSPACE_ID is not set}"
                        : "${AML_WORKSPACE_NAME:?AML_WORKSPACE_NAME is required when AML_WORKSPACE_ID is not set}"

                        workspace_id="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${AML_WORKSPACE_RG}/providers/Microsoft.MachineLearningServices/workspaces/${AML_WORKSPACE_NAME}"
                      fi

                      echo "Using AML workspace ID: $workspace_id"

                      RULE_NAMES=(
                        "FoundryEndpoint"
                        "FabricEndpoint"
                        "Onelake-Endpoint"
                        "Python-Package-Index"
                        "Anaconda"
                        "Anaconda-Repo"
                        "Astral"
                        "Conda"
                        "Github"
                        "Github-user-content"
                        "Hashicorp"
                        "Python"
                        "Python-Files"
                        "Terraform-Registry"
                        "Central-Foundry-Endpoint"
                        "Central-Registry-Endpoint"
                        "DevOps"
                      )

                      for rule_name in "${RULE_NAMES[@]}"; do
                        tf_addr="module.azureml_workspace.azapi_resource.managed_network_outbound_rule[\"${rule_name}\"]"
                        rule_id="${workspace_id}/managedNetworks/default/outboundRules/${rule_name}"

                        echo "------------------------------------------------------------"
                        echo "Rule: $rule_name"
                        echo "Terraform address: $tf_addr"
                        echo "Azure resource ID: $rule_id"

                        if terraform state show "$tf_addr" >/dev/null 2>&1; then
                          echo "Already imported. Skipping: $rule_name"
                        else
                          terraform import -no-color -var-file="terraform.tfvars" "$tf_addr" "$rule_id"
                        fi
                      done

                      echo "------------------------------------------------------------"
                      echo "Imported managed_network_outbound_rule resources:"
                      terraform state list | grep 'managed_network_outbound_rule' || true

                      echo "------------------------------------------------------------"
                      echo "Running final drift check plan..."
                      set +e
                      terraform plan -no-color -var-file="terraform.tfvars" -detailed-exitcode
                      plan_exit=$?
                      set -e

                      if [ "$plan_exit" -eq 0 ]; then
                        echo "SUCCESS: Terraform plan is clean. No changes detected."
                      elif [ "$plan_exit" -eq 2 ]; then
                        echo "ERROR: Terraform still sees changes after import. Review the plan output. Do not apply blindly."
                        exit 2
                      else
                        echo "ERROR: terraform plan failed."
                        exit "$plan_exit"
                      fi
