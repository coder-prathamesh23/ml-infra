trigger: none
pr: none

parameters:
  - name: action
    displayName: Action
    type: string
    default: generate-config
    values:
      - generate-config
      - import-plan
      - import-apply
      - normal-plan

  - name: stackPath
    displayName: Terraform stack path
    type: string
    default: stacks/addons/environment-rbac

  - name: terraformVersion
    displayName: Terraform version
    type: string
    default: 1.13.3

variables:
  - group: DATA_SCIENCE_LZ_DEV

  - name: DEPLOY_ENV
    value: dev

  - name: AZDO_ENVIRONMENT
    value: data-science-lz-dev-rbac-reconcile

  - name: TARGET_SUBSCRIPTION_ID
    value: f956ebe7-509b-41be-8dc2-6310517151c1

  - name: DEV_AML_WORKSPACE_ID
    value: /subscriptions/f956ebe7-509b-41be-8dc2-6310517151c1/resourceGroups/rg-core-dev-dslz-westus3/providers/Microsoft.MachineLearningServices/workspaces/mlw-dev-dslz-westus3

  - name: DEV_AML_STORAGE_ACCOUNT_ID
    value: /subscriptions/f956ebe7-509b-41be-8dc2-6310517151c1/resourceGroups/rg-core-dev-dslz-westus3/providers/Microsoft.Storage/storageAccounts/stdslzdevwestus301

  - name: ML_ENGINEERS_GROUP_OBJECT_ID
    value: 28073c52-9c1f-48e3-bda5-93dfda257f91

pool:
  name: azumanage-flz

stages:
  - stage: GenerateConfig
    displayName: Generate starter config
    condition: eq('${{ parameters.action }}', 'generate-config')
    jobs:
      - job: GenerateConfig
        displayName: Discover existing Dev environment RBAC
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: Discover existing role assignments and generate outputs
            inputs:
              azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
              scriptType: bash
              scriptLocation: inlineScript
              addSpnToEnvironment: true
              inlineScript: |
                set -euo pipefail

                az account set --subscription "$(TARGET_SUBSCRIPTION_ID)"

                mkdir -p "$(Build.ArtifactStagingDirectory)/generated"

                get_assignment_ids() {
                  local assignee="$1"
                  local role="$2"
                  local scope="$3"

                  az role assignment list \
                    --assignee "$assignee" \
                    --role "$role" \
                    --scope "$scope" \
                    --query "[].id" \
                    -o tsv | sed '/^$/d' || true
                }

                mapfile -t AML_ASSIGNMENT_IDS < <(get_assignment_ids "$(ML_ENGINEERS_GROUP_OBJECT_ID)" "Contributor" "$(DEV_AML_WORKSPACE_ID)")
                mapfile -t STORAGE_ASSIGNMENT_IDS < <(get_assignment_ids "$(ML_ENGINEERS_GROUP_OBJECT_ID)" "Storage Blob Data Contributor" "$(DEV_AML_STORAGE_ACCOUNT_ID)")

                AML_ASSIGNMENT_ID="${AML_ASSIGNMENT_IDS[0]:-NOT_FOUND}"
                STORAGE_ASSIGNMENT_ID="${STORAGE_ASSIGNMENT_IDS[0]:-NOT_FOUND}"

                cat > "$(Build.ArtifactStagingDirectory)/generated/dev-environment-rbac-discovery.txt" <<EOF
                Dev Environment RBAC Reconciliation Discovery

                1. ML_engineers access on Dev AML workspace
                Scope:
                $(DEV_AML_WORKSPACE_ID)

                Principal:
                ML_engineers AD group

                Principal object ID:
                $(ML_ENGINEERS_GROUP_OBJECT_ID)

                Expected role:
                Contributor

                Matching assignment count:
                ${#AML_ASSIGNMENT_IDS[@]}

                Existing Azure role assignment full resource ID:
                ${AML_ASSIGNMENT_ID}


                2. ML_engineers access on Dev AML workspace storage account
                Scope:
                $(DEV_AML_STORAGE_ACCOUNT_ID)

                Principal:
                ML_engineers AD group

                Principal object ID:
                $(ML_ENGINEERS_GROUP_OBJECT_ID)

                Expected role:
                Storage Blob Data Contributor

                Matching assignment count:
                ${#STORAGE_ASSIGNMENT_IDS[@]}

                Existing Azure role assignment full resource ID:
                ${STORAGE_ASSIGNMENT_ID}
                EOF

                cat > "$(Build.ArtifactStagingDirectory)/generated/dev-environment-rbac-starter-tfvars-snippet.hcl" <<EOF
                # Starter snippet only.
                # Do not paste blindly.
                # Merge these entries into existing stacks/addons/environment-rbac/terraform.tfvars maps.

                # Add inside existing aml_workspace_role_assignments map:
                ml_engineers = {
                  principal_id                     = "$(ML_ENGINEERS_GROUP_OBJECT_ID)"
                  principal_type                   = "Group"
                  role_definition_name             = "Contributor"
                  skip_service_principal_aad_check = false
                }

                # Add inside existing storage_blob_role_assignments map:
                ml_engineers = {
                  principal_id                     = "$(ML_ENGINEERS_GROUP_OBJECT_ID)"
                  principal_type                   = "Group"
                  skip_service_principal_aad_check = false
                }
                EOF

                cat > "$(Build.ArtifactStagingDirectory)/generated/dev-environment-rbac-imports.tf" <<EOF
                # Starter import blocks only.
                # Use after matching Terraform config has been added.

                import {
                  to = module.environment_rbac.azurerm_role_assignment.aml_workspace_access["ml_engineers"]
                  id = "${AML_ASSIGNMENT_ID}"
                }

                import {
                  to = module.environment_rbac.azurerm_role_assignment.storage_blob_data_contributor["ml_engineers"]
                  id = "${STORAGE_ASSIGNMENT_ID}"
                }
                EOF

                echo "Generated discovery:"
                cat "$(Build.ArtifactStagingDirectory)/generated/dev-environment-rbac-discovery.txt"

                echo ""
                echo "Existing assignments on AML workspace for this group:"
                az role assignment list \
                  --assignee "$(ML_ENGINEERS_GROUP_OBJECT_ID)" \
                  --scope "$(DEV_AML_WORKSPACE_ID)" \
                  --query "[].{role:roleDefinitionName,scope:scope,id:id}" \
                  -o table || true

                echo ""
                echo "Existing assignments on storage account for this group:"
                az role assignment list \
                  --assignee "$(ML_ENGINEERS_GROUP_OBJECT_ID)" \
                  --scope "$(DEV_AML_STORAGE_ACCOUNT_ID)" \
                  --query "[].{role:roleDefinitionName,scope:scope,id:id}" \
                  -o table || true

          - publish: "$(Build.ArtifactStagingDirectory)/generated"
            artifact: generated-rbac-config
            displayName: Publish generated RBAC config

  - stage: ImportPlan
    displayName: Import plan
    condition: or(eq('${{ parameters.action }}', 'import-plan'), eq('${{ parameters.action }}', 'import-apply'))
    jobs:
      - job: ImportPlan
        displayName: Generate import blocks and run Terraform plan
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: Install Terraform
            inputs:
              terraformVersion: ${{ parameters.terraformVersion }}

          - task: AzureCLI@2
            displayName: Terraform import plan
            inputs:
              azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
              scriptType: bash
              scriptLocation: inlineScript
              addSpnToEnvironment: true
              inlineScript: |
                set -euo pipefail

                az account set --subscription "$(TARGET_SUBSCRIPTION_ID)"

                STACK_PATH="${{ parameters.stackPath }}"
                STACK_PATH="${STACK_PATH#/}"
                STACK_PATH="${STACK_PATH%/}"

                if [ ! -d "$STACK_PATH" ]; then
                  echo "ERROR: Stack path does not exist: $STACK_PATH"
                  exit 1
                fi

                cd "$STACK_PATH"

                : "${TF_BACKEND_RG:?TF_BACKEND_RG is required}"
                : "${TF_BACKEND_STORAGE:?TF_BACKEND_STORAGE is required}"
                : "${TF_BACKEND_CONTAINER:?TF_BACKEND_CONTAINER is required}"

                KEY="${DEPLOY_ENV}/${STACK_PATH}/terraform.tfstate"

                terraform init -input=false -no-color \
                  -backend-config="resource_group_name=${TF_BACKEND_RG}" \
                  -backend-config="storage_account_name=${TF_BACKEND_STORAGE}" \
                  -backend-config="container_name=${TF_BACKEND_CONTAINER}" \
                  -backend-config="key=${KEY}" \
                  -backend-config="use_azuread_auth=true"

                terraform fmt -check -diff -recursive
                terraform validate -no-color

                require_one_assignment_id() {
                  local assignee="$1"
                  local role="$2"
                  local scope="$3"
                  local label="$4"

                  mapfile -t ids < <(az role assignment list \
                    --assignee "$assignee" \
                    --role "$role" \
                    --scope "$scope" \
                    --query "[].id" \
                    -o tsv | sed '/^$/d' || true)

                  echo "$label matching assignment count: ${#ids[@]}" >&2

                  if [ "${#ids[@]}" -ne 1 ]; then
                    echo "ERROR: Expected exactly one existing role assignment for $label, found ${#ids[@]}." >&2
                    echo "Scope: $scope" >&2
                    echo "Role: $role" >&2
                    echo "Assignee: $assignee" >&2
                    exit 1
                  fi

                  echo "${ids[0]}"
                }

                AML_ASSIGNMENT_ID="$(require_one_assignment_id "$(ML_ENGINEERS_GROUP_OBJECT_ID)" "Contributor" "$(DEV_AML_WORKSPACE_ID)" "ML_engineers Contributor on Dev AML workspace")"
                STORAGE_ASSIGNMENT_ID="$(require_one_assignment_id "$(ML_ENGINEERS_GROUP_OBJECT_ID)" "Storage Blob Data Contributor" "$(DEV_AML_STORAGE_ACCOUNT_ID)" "ML_engineers Storage Blob Data Contributor on Dev storage")"

                : > zz_generated_rbac_imports.tf

                if ! terraform state show 'module.environment_rbac.azurerm_role_assignment.aml_workspace_access["ml_engineers"]' >/dev/null 2>&1; then
                  cat >> zz_generated_rbac_imports.tf <<EOF
                import {
                  to = module.environment_rbac.azurerm_role_assignment.aml_workspace_access["ml_engineers"]
                  id = "$AML_ASSIGNMENT_ID"
                }

                EOF
                fi

                if ! terraform state show 'module.environment_rbac.azurerm_role_assignment.storage_blob_data_contributor["ml_engineers"]' >/dev/null 2>&1; then
                  cat >> zz_generated_rbac_imports.tf <<EOF
                import {
                  to = module.environment_rbac.azurerm_role_assignment.storage_blob_data_contributor["ml_engineers"]
                  id = "$STORAGE_ASSIGNMENT_ID"
                }

                EOF
                fi

                echo "Generated import blocks:"
                cat zz_generated_rbac_imports.tf

                terraform plan -no-color -var-file="terraform.tfvars" -out="$(Build.ArtifactStagingDirectory)/tfplan"
                terraform show -no-color "$(Build.ArtifactStagingDirectory)/tfplan" > "$(Build.ArtifactStagingDirectory)/tfplan.txt"

                cp zz_generated_rbac_imports.tf "$(Build.ArtifactStagingDirectory)/zz_generated_rbac_imports.tf"

          - publish: "$(Build.ArtifactStagingDirectory)"
            artifact: tfplan
            displayName: Publish import plan artifact

    - stage: ImportApply
    displayName: Import apply
    dependsOn: ImportPlan
    condition: and(succeeded('ImportPlan'), eq('${{ parameters.action }}', 'import-apply'))
    jobs:
      - deployment: ImportApply
        displayName: Apply import plan
        environment: ${{ variables.AZDO_ENVIRONMENT }}
        pool:
          name: azumanage-flz
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: TerraformInstaller@1
                  displayName: Install Terraform
                  inputs:
                    terraformVersion: ${{ parameters.terraformVersion }}

                - download: current
                  artifact: tfplan
                  displayName: Download import plan artifact

                - task: AzureCLI@2
                  displayName: Terraform apply saved import plan
                  inputs:
                    azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
                    scriptType: bash
                    scriptLocation: inlineScript
                    addSpnToEnvironment: true
                    inlineScript: |
                      set -euo pipefail

                      az account set --subscription "$(TARGET_SUBSCRIPTION_ID)"

                      STACK_PATH="${{ parameters.stackPath }}"
                      STACK_PATH="${STACK_PATH#/}"
                      STACK_PATH="${STACK_PATH%/}"

                      cd "$STACK_PATH"

                      if [ -f "$(Pipeline.Workspace)/tfplan/zz_generated_rbac_imports.tf" ]; then
                        cp "$(Pipeline.Workspace)/tfplan/zz_generated_rbac_imports.tf" ./zz_generated_rbac_imports.tf
                      else
                        echo "ERROR: zz_generated_rbac_imports.tf not found in tfplan artifact."
                        exit 1
                      fi

                      if [ ! -f "$(Pipeline.Workspace)/tfplan/tfplan" ]; then
                        echo "ERROR: Saved tfplan not found in tfplan artifact."
                        exit 1
                      fi

                      KEY="${DEPLOY_ENV}/${STACK_PATH}/terraform.tfstate"

                      terraform init -input=false -no-color \
                        -backend-config="resource_group_name=${TF_BACKEND_RG}" \
                        -backend-config="storage_account_name=${TF_BACKEND_STORAGE}" \
                        -backend-config="container_name=${TF_BACKEND_CONTAINER}" \
                        -backend-config="key=${KEY}" \
                        -backend-config="use_azuread_auth=true"

                      terraform apply -no-color -auto-approve "$(Pipeline.Workspace)/tfplan/tfplan"
