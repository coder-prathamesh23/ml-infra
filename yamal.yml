trigger: none
pr: none

name: qa-core-rg-import-$(Date:yyyyMMdd)$(Rev:.r)

parameters:
  - name: runImportApply
    displayName: Run import apply after reviewing import plan
    type: boolean
    default: false

  - name: stackPath
    displayName: Stack path
    type: string
    default: stacks/data-science-lz-core

  - name: terraformVersion
    displayName: Terraform version
    type: string
    default: 1.7.5

variables:
  - group: DATA_SCIENCE_LZ_QA

  - name: TF_IN_AUTOMATION
    value: "true"

  # Real QA subscription ID provided.
  - name: QA_SUBSCRIPTION_ID
    value: "6b92cf8c-b6d5-49b0-9e4e-955730029fb4"

  # Existing resource group created by Adrian.
  - name: QA_CORE_RESOURCE_GROUP_NAME
    value: "rg-core-qa-dslz-westus3"

  # Terraform address from the QA Core plan.
  - name: RG_TERRAFORM_ADDRESS
    value: "azurerm_resource_group.protected[0]"

  # Expected RG configuration from the QA Core Terraform plan.
  # If Adrian's RG differs, the pipeline stops before import so we do not update the RG.
  - name: EXPECTED_LOCATION
    value: "westus3"

  - name: EXPECTED_TAG_COSTCENTER
    value: "143009534"

  - name: EXPECTED_TAG_OWNER1
    value: "clairelocke@pse.com"

  - name: EXPECTED_TAG_OWNER2
    value: "banjamin.ahlvin@pse.com"

  - name: EXPECTED_TAG_WORKORDER
    value: "1198"

pool:
  name: azumanage-flz

stages:
  # ------------------------------------------------------------
  # 1) Discover existing RG and RBAC
  # ------------------------------------------------------------
  - stage: DiscoverExistingResourceGroup
    displayName: Discover existing QA Core resource group
    jobs:
      - job: Discover
        displayName: Discover RG and RBAC
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: Discover existing QA Core RG and RBAC
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                QA_RG_ID="/subscriptions/$(QA_SUBSCRIPTION_ID)/resourceGroups/$(QA_CORE_RESOURCE_GROUP_NAME)"

                echo "Setting subscription context to QA subscription:"
                echo "$(QA_SUBSCRIPTION_ID)"
                az account set --subscription "$(QA_SUBSCRIPTION_ID)"

                echo ""
                echo "Discovering existing resource group:"
                echo "$QA_RG_ID"

                az group show \
                  --name "$(QA_CORE_RESOURCE_GROUP_NAME)" \
                  --query "{id:id,name:name,location:location,tags:tags,managedBy:managedBy}" \
                  -o json | tee "$(Build.ArtifactStagingDirectory)/qa-core-rg-discovery.json"

                echo ""
                echo "Discovering direct RBAC assignments on existing resource group..."
                az role assignment list \
                  --scope "$QA_RG_ID" \
                  --include-inherited false \
                  --query "[].{role:roleDefinitionName,principalId:principalId,principalType:principalType,scope:scope}" \
                  -o json | tee "$(Build.ArtifactStagingDirectory)/qa-core-rg-role-assignments.json"

                echo ""
                echo "Existing direct RBAC assignments:"
                az role assignment list \
                  --scope "$QA_RG_ID" \
                  --include-inherited false \
                  --query "[].{role:roleDefinitionName,principalId:principalId,principalType:principalType}" \
                  -o table

          - task: Bash@3
            displayName: Validate existing RG matches Terraform configuration
            inputs:
              targetType: inline
              script: |
                set -euo pipefail

                python3 << 'PY'
                import json
                import os
                import sys

                discovery_path = os.path.join(
                    os.environ["BUILD_ARTIFACTSTAGINGDIRECTORY"],
                    "qa-core-rg-discovery.json"
                )

                with open(discovery_path, "r", encoding="utf-8") as f:
                    rg = json.load(f)

                expected_id = f"/subscriptions/{os.environ['QA_SUBSCRIPTION_ID']}/resourceGroups/{os.environ['QA_CORE_RESOURCE_GROUP_NAME']}".lower()
                actual_id = str(rg.get("id", "")).lower()

                if actual_id != expected_id:
                    print("ERROR: Resource group ID mismatch.")
                    print(f"Expected: {expected_id}")
                    print(f"Actual:   {actual_id}")
                    sys.exit(1)

                expected_location = os.environ["EXPECTED_LOCATION"].lower()
                actual_location = str(rg.get("location", "")).lower()

                if actual_location != expected_location:
                    print("ERROR: Resource group location mismatch.")
                    print(f"Expected: {expected_location}")
                    print(f"Actual:   {actual_location}")
                    sys.exit(1)

                expected_tags = {
                    "costcenter": os.environ["EXPECTED_TAG_COSTCENTER"],
                    "owner1": os.environ["EXPECTED_TAG_OWNER1"],
                    "owner2": os.environ["EXPECTED_TAG_OWNER2"],
                    "workorder": os.environ["EXPECTED_TAG_WORKORDER"],
                }

                actual_tags = rg.get("tags") or {}

                if actual_tags != expected_tags:
                    print("ERROR: Existing RG tags do not exactly match Terraform expected tags.")
                    print("Continuing would cause Terraform to update the existing RG after import.")
                    print("Do not continue until tags are aligned or tag ignore is intentionally approved.")
                    print("")
                    print("Expected tags:")
                    print(json.dumps(expected_tags, indent=2, sort_keys=True))
                    print("")
                    print("Actual tags:")
                    print(json.dumps(actual_tags, indent=2, sort_keys=True))
                    sys.exit(1)

                print("RG validation passed.")
                print("Existing RG ID, location, and tags match Terraform configuration.")
                PY
            env:
              BUILD_ARTIFACTSTAGINGDIRECTORY: $(Build.ArtifactStagingDirectory)
              QA_SUBSCRIPTION_ID: $(QA_SUBSCRIPTION_ID)
              QA_CORE_RESOURCE_GROUP_NAME: $(QA_CORE_RESOURCE_GROUP_NAME)
              EXPECTED_LOCATION: $(EXPECTED_LOCATION)
              EXPECTED_TAG_COSTCENTER: $(EXPECTED_TAG_COSTCENTER)
              EXPECTED_TAG_OWNER1: $(EXPECTED_TAG_OWNER1)
              EXPECTED_TAG_OWNER2: $(EXPECTED_TAG_OWNER2)
              EXPECTED_TAG_WORKORDER: $(EXPECTED_TAG_WORKORDER)

          - publish: $(Build.ArtifactStagingDirectory)
            artifact: qa-core-rg-discovery
            displayName: Publish RG discovery artifacts

  # ------------------------------------------------------------
  # 2) Import plan only
  # ------------------------------------------------------------
  - stage: ImportPlan
    displayName: Terraform import plan into QA Core state
    dependsOn: DiscoverExistingResourceGroup
    jobs:
      - job: ImportPlan
        displayName: Generate targeted import plan
        steps:
          - checkout: self

          - task: Bash@3
            displayName: Install Terraform
            inputs:
              targetType: inline
              script: |
                set -euo pipefail

                TERRAFORM_VERSION="${{ parameters.terraformVersion }}"
                INSTALL_DIR="$(Agent.TempDirectory)/terraform"

                mkdir -p "$INSTALL_DIR"

                curl -fsSL \
                  -o "$(Agent.TempDirectory)/terraform.zip" \
                  "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip"

                unzip -o "$(Agent.TempDirectory)/terraform.zip" -d "$INSTALL_DIR"

                echo "##vso[task.prependpath]$INSTALL_DIR"

                "$INSTALL_DIR/terraform" version

          - task: AzureCLI@2
            displayName: Terraform init and targeted import plan
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                export TF_IN_AUTOMATION=true

                STACK_PATH="${{ parameters.stackPath }}"
                QA_RG_ID="/subscriptions/$(QA_SUBSCRIPTION_ID)/resourceGroups/$(QA_CORE_RESOURCE_GROUP_NAME)"

                BACKEND_KEY="${TF_BACKEND_KEY:-}"
                if [ -z "$BACKEND_KEY" ]; then
                  BACKEND_KEY="${DEPLOY_ENV}/${STACK_PATH}/terraform.tfstate"
                fi

                echo "Setting subscription context to QA subscription:"
                echo "$(QA_SUBSCRIPTION_ID)"
                az account set --subscription "$(QA_SUBSCRIPTION_ID)"

                echo ""
                echo "Terraform stack path:"
                echo "$STACK_PATH"

                echo ""
                echo "Terraform backend:"
                echo "  resource_group_name  = ${TF_BACKEND_RG}"
                echo "  storage_account_name = ${TF_BACKEND_STORAGE}"
                echo "  container_name       = ${TF_BACKEND_CONTAINER}"
                echo "  key                  = ${BACKEND_KEY}"

                cd "$(Build.SourcesDirectory)/${STACK_PATH}"

                echo ""
                echo "Creating temporary imports.tf in pipeline workspace only..."
                cat > imports.tf <<EOF
                import {
                  to = $(RG_TERRAFORM_ADDRESS)
                  id = "${QA_RG_ID}"
                }
                EOF

                echo ""
                echo "Temporary imports.tf:"
                cat imports.tf

                echo ""
                echo "Running terraform init against QA Core backend..."
                terraform init -reconfigure \
                  -backend-config="resource_group_name=${TF_BACKEND_RG}" \
                  -backend-config="storage_account_name=${TF_BACKEND_STORAGE}" \
                  -backend-config="container_name=${TF_BACKEND_CONTAINER}" \
                  -backend-config="key=${BACKEND_KEY}" \
                  -backend-config="use_azuread_auth=true"

                echo ""
                echo "Running terraform fmt and validate..."
                terraform fmt -check -recursive
                terraform validate

                echo ""
                echo "Running targeted import plan for $(RG_TERRAFORM_ADDRESS)..."
                terraform plan \
                  -lock-timeout=5m \
                  -target="$(RG_TERRAFORM_ADDRESS)" \
                  -out="$(Build.ArtifactStagingDirectory)/qa-core-rg-import.tfplan"

                terraform show -no-color "$(Build.ArtifactStagingDirectory)/qa-core-rg-import.tfplan" \
                  | tee "$(Build.ArtifactStagingDirectory)/qa-core-rg-import-plan.txt"

                PLAN_TEXT="$(Build.ArtifactStagingDirectory)/qa-core-rg-import-plan.txt"

                echo ""
                echo "Safety check: import plan must not create, update, replace, or destroy the RG."

                if grep -F "# $(RG_TERRAFORM_ADDRESS) will be created" "$PLAN_TEXT"; then
                  echo "ERROR: RG is still planned for creation. Import block did not work."
                  exit 1
                fi

                if grep -F "# $(RG_TERRAFORM_ADDRESS) will be updated in-place" "$PLAN_TEXT"; then
                  echo "ERROR: RG is planned for update. Existing RG config does not match Terraform config."
                  exit 1
                fi

                if grep -F "# $(RG_TERRAFORM_ADDRESS) must be replaced" "$PLAN_TEXT"; then
                  echo "ERROR: RG is planned for replacement. Stopping."
                  exit 1
                fi

                if grep -F "# $(RG_TERRAFORM_ADDRESS) will be destroyed" "$PLAN_TEXT"; then
                  echo "ERROR: RG is planned for destroy. Stopping."
                  exit 1
                fi

                if grep -E "Plan: .* [1-9][0-9]* to add|Plan: .* [1-9][0-9]* to change|Plan: .* [1-9][0-9]* to destroy" "$PLAN_TEXT"; then
                  echo "ERROR: Import plan includes add/change/destroy actions. Stopping."
                  exit 1
                fi

                echo ""
                echo "Import plan safety checks passed."
                echo "Expected acceptable result is: 1 to import, 0 to add, 0 to change, 0 to destroy."

          - publish: $(Build.ArtifactStagingDirectory)
            artifact: qa-core-rg-import-plan
            displayName: Publish import plan artifact

  # ------------------------------------------------------------
  # 3) Import apply
  # ------------------------------------------------------------
  - stage: ImportApply
    displayName: Terraform import apply into QA Core state
    dependsOn: ImportPlan
    condition: and(succeeded(), eq('${{ parameters.runImportApply }}', true))
    jobs:
      - deployment: ImportApply
        displayName: Apply targeted import plan
        environment: $(AZDO_ENVIRONMENT)
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - download: current
                  artifact: qa-core-rg-import-plan

                - task: Bash@3
                  displayName: Install Terraform
                  inputs:
                    targetType: inline
                    script: |
                      set -euo pipefail

                      TERRAFORM_VERSION="${{ parameters.terraformVersion }}"
                      INSTALL_DIR="$(Agent.TempDirectory)/terraform"

                      mkdir -p "$INSTALL_DIR"

                      curl -fsSL \
                        -o "$(Agent.TempDirectory)/terraform.zip" \
                        "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip"

                      unzip -o "$(Agent.TempDirectory)/terraform.zip" -d "$INSTALL_DIR"

                      echo "##vso[task.prependpath]$INSTALL_DIR"

                      "$INSTALL_DIR/terraform" version

                - task: AzureCLI@2
                  displayName: Terraform apply targeted import plan
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail

                      export TF_IN_AUTOMATION=true

                      STACK_PATH="${{ parameters.stackPath }}"
                      QA_RG_ID="/subscriptions/$(QA_SUBSCRIPTION_ID)/resourceGroups/$(QA_CORE_RESOURCE_GROUP_NAME)"

                      BACKEND_KEY="${TF_BACKEND_KEY:-}"
                      if [ -z "$BACKEND_KEY" ]; then
                        BACKEND_KEY="${DEPLOY_ENV}/${STACK_PATH}/terraform.tfstate"
                      fi

                      echo "Setting subscription context to QA subscription:"
                      echo "$(QA_SUBSCRIPTION_ID)"
                      az account set --subscription "$(QA_SUBSCRIPTION_ID)"

                      echo ""
                      echo "Terraform backend key for import:"
                      echo "$BACKEND_KEY"

                      cd "$(Build.SourcesDirectory)/${STACK_PATH}"

                      echo ""
                      echo "Recreating temporary imports.tf in apply workspace..."
                      cat > imports.tf <<EOF
                      import {
                        to = $(RG_TERRAFORM_ADDRESS)
                        id = "${QA_RG_ID}"
                      }
                      EOF

                      echo ""
                      echo "Running terraform init against QA Core backend..."
                      terraform init -reconfigure \
                        -backend-config="resource_group_name=${TF_BACKEND_RG}" \
                        -backend-config="storage_account_name=${TF_BACKEND_STORAGE}" \
                        -backend-config="container_name=${TF_BACKEND_CONTAINER}" \
                        -backend-config="key=${BACKEND_KEY}" \
                        -backend-config="use_azuread_auth=true"

                      echo ""
                      echo "Applying saved import plan..."
                      terraform apply -auto-approve "$(Pipeline.Workspace)/qa-core-rg-import-plan/qa-core-rg-import.tfplan"

                      echo ""
                      echo "Import completed. QA Core state now contains:"
                      terraform state list | tee "$(Build.ArtifactStagingDirectory)/qa-core-state-list-after-import.txt"

                      echo ""
                      echo "Verifying imported RG state:"
                      terraform state show "$(RG_TERRAFORM_ADDRESS)" \
                        | tee "$(Build.ArtifactStagingDirectory)/qa-core-imported-rg-state.txt"

                - publish: $(Build.ArtifactStagingDirectory)
                  artifact: qa-core-rg-import-apply
                  displayName: Publish import apply artifacts

  # ------------------------------------------------------------
  # 4) Normal post-import plan
  # ------------------------------------------------------------
  - stage: PostImportNormalPlan
    displayName: Normal QA Core plan after RG import
    dependsOn: ImportApply
    condition: and(succeeded(), eq('${{ parameters.runImportApply }}', true))
    jobs:
      - job: PostImportPlan
        displayName: Run normal QA Core plan after import
        steps:
          - checkout: self

          - task: Bash@3
            displayName: Install Terraform
            inputs:
              targetType: inline
              script: |
                set -euo pipefail

                TERRAFORM_VERSION="${{ parameters.terraformVersion }}"
                INSTALL_DIR="$(Agent.TempDirectory)/terraform"

                mkdir -p "$INSTALL_DIR"

                curl -fsSL \
                  -o "$(Agent.TempDirectory)/terraform.zip" \
                  "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip"

                unzip -o "$(Agent.TempDirectory)/terraform.zip" -d "$INSTALL_DIR"

                echo "##vso[task.prependpath]$INSTALL_DIR"

                "$INSTALL_DIR/terraform" version

          - task: AzureCLI@2
            displayName: Terraform normal plan after import
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                export TF_IN_AUTOMATION=true

                STACK_PATH="${{ parameters.stackPath }}"

                BACKEND_KEY="${TF_BACKEND_KEY:-}"
                if [ -z "$BACKEND_KEY" ]; then
                  BACKEND_KEY="${DEPLOY_ENV}/${STACK_PATH}/terraform.tfstate"
                fi

                echo "Setting subscription context to QA subscription:"
                echo "$(QA_SUBSCRIPTION_ID)"
                az account set --subscription "$(QA_SUBSCRIPTION_ID)"

                echo ""
                echo "Terraform backend key for normal post-import plan:"
                echo "$BACKEND_KEY"

                cd "$(Build.SourcesDirectory)/${STACK_PATH}"

                echo ""
                echo "Ensuring no temporary import block exists for normal plan..."
                rm -f imports.tf

                echo ""
                echo "Running terraform init against QA Core backend..."
                terraform init -reconfigure \
                  -backend-config="resource_group_name=${TF_BACKEND_RG}" \
                  -backend-config="storage_account_name=${TF_BACKEND_STORAGE}" \
                  -backend-config="container_name=${TF_BACKEND_CONTAINER}" \
                  -backend-config="key=${BACKEND_KEY}" \
                  -backend-config="use_azuread_auth=true"

                echo ""
                echo "Running terraform fmt and validate..."
                terraform fmt -check -recursive
                terraform validate

                echo ""
                echo "Running normal QA Core plan after import..."
                terraform plan \
                  -lock-timeout=5m \
                  -out="$(Build.ArtifactStagingDirectory)/qa-core-post-import.tfplan"

                terraform show -no-color "$(Build.ArtifactStagingDirectory)/qa-core-post-import.tfplan" \
                  | tee "$(Build.ArtifactStagingDirectory)/qa-core-post-import-plan.txt"

                PLAN_TEXT="$(Build.ArtifactStagingDirectory)/qa-core-post-import-plan.txt"

                echo ""
                echo "Safety check: RG must not be created after import."
                if grep -F "# $(RG_TERRAFORM_ADDRESS) will be created" "$PLAN_TEXT"; then
                  echo "ERROR: RG is still planned for creation. Import did not land in the correct backend state."
                  exit 1
                fi

                echo ""
                echo "Safety check: RG must not be updated, replaced, or destroyed."
                if grep -F "# $(RG_TERRAFORM_ADDRESS) will be updated in-place" "$PLAN_TEXT"; then
                  echo "ERROR: RG is planned for update. Stopping."
                  exit 1
                fi

                if grep -F "# $(RG_TERRAFORM_ADDRESS) must be replaced" "$PLAN_TEXT"; then
                  echo "ERROR: RG is planned for replacement. Stopping."
                  exit 1
                fi

                if grep -F "# $(RG_TERRAFORM_ADDRESS) will be destroyed" "$PLAN_TEXT"; then
                  echo "ERROR: RG is planned for destroy. Stopping."
                  exit 1
                fi

                echo ""
                echo "DNS strategy check: Terraform must not create private_dns_zone_group blocks."
                if grep -F "+ private_dns_zone_group" "$PLAN_TEXT"; then
                  echo "ERROR: Plan contains Terraform-managed private_dns_zone_group creation."
                  exit 1
                fi

                echo ""
                echo "Post-import normal plan safety checks passed."
                echo "Expected outcome: existing RG is now in state, and only remaining QA Core resources are planned."

          - publish: $(Build.ArtifactStagingDirectory)
            artifact: qa-core-post-import-plan
            displayName: Publish post-import normal plan
